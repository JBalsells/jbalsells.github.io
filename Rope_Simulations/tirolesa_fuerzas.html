<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Fuerzas en la Tirolesa</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Fuerzas en la Tirolesa', icon: 'fas fa-wave-square' });
  var C = RS.COLORS, G = RS.G, phys = RS.phys, draw = RS.draw;
  var NFPA = RS.NFPA_WORK_LOAD, MBS = RS.ROPE_STATIC_MBS;

  root.innerHTML =
    '<h1>Fuerzas en la Tirolesa</h1>' +
    '<p class="warning-bar">Cuanto MENOS cuelga la cuerda, MÁS fuerza aguanta cada anclaje. Una tirolesa muy tensa es peligrosa.</p>' +
    '<div class="sim-stage"><canvas id="cvM" width="720" height="500"></canvas><canvas id="cvI" width="390" height="500"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">La distancia A↔B se calcula a partir de la longitud de cuerda + la flecha. Menor flecha → mayor tensión; anclaje más alto → más tensión en ese lado.</p>';

  var cvM = document.getElementById('cvM'), cvI = document.getElementById('cvI');
  var ctxM = RS.setupCanvas(cvM), ctxI = RS.setupCanvas(cvI);
  var WM = cvM._cssW, HM = cvM._cssH, WI = cvI._cssW, HI = cvI._cssH;

  var DIAG = { x0: 20, y0: 20, w: WM - 40, h: 300 };
  var CRV = { x0: 60, y0: 350, w: WM - 90, h: 120 };

  function render(v) {
    var S = v.span, d = Math.min(v.sag, 0.48 * v.span), mass = v.load, hA = v.hA, hB = 0, pos = v.pos;
    var W_kN = mass * G / 1000;
    var L = Math.max(phys.spanForRope(S, d, hA, hB), 1.0);
    var loadX = pos / 100 * L;
    var yP = phys.solveLoadY(loadX, L, hA, hB, S);
    var f = phys.tyroleanForces(loadX, L, hA, hB, yP, W_kN);
    var TA = f.T_A, TB = f.T_B, Tmax = Math.max(TA, TB);

    // perfil
    var N = 60, prof = [];
    for (var i = 0; i < N; i++) {
      var pct = (i + 0.5) / N, xi = pct * L, yi = phys.solveLoadY(xi, L, hA, hB, S);
      var fi = phys.tyroleanForces(xi, L, hA, hB, yi, W_kN);
      prof.push([pct * 100, fi.T_A, fi.T_B]);
    }

    // ── Diagrama ──
    var ctx = ctxM;
    draw.clear(ctx, WM, HM);
    var yLowC = (hA + hB) / 2 - d;
    var yHi = Math.max(hA, hB) + Math.max(d * 0.5, 0.5);
    var yLo = yLowC - Math.max(W_kN * 0.5, d * 0.4, 1.0);
    var plotH = Math.max(yHi - yLo, 1.0);
    var xmin = -L * 0.12, xmax = L * 1.12, ymin = yLo, ymax = yHi + plotH * 0.5;
    function mx(m) { return DIAG.x0 + (m - xmin) / (xmax - xmin) * DIAG.w; }
    function my(m) { return DIAG.y0 + (ymax - m) / (ymax - ymin) * DIAG.h; }
    // ref A-B
    draw.dashedLine(ctx, mx(0), my(hA), mx(L), my(hB), C.grid, 1, [4, 4]);
    // cota
    var yCota = yHi + plotH * 0.34;
    draw.arrow(ctx, mx(0), my(yCota), mx(L), my(yCota), C.text, 1.2, 8);
    draw.arrow(ctx, mx(L), my(yCota), mx(0), my(yCota), C.text, 1.2, 8);
    draw.text(ctx, mx(L / 2), my(yCota) - 6, 'distancia A ↔ B = ' + L.toFixed(1) + ' m', C.text, 11, { align: 'center', baseline: 'bottom', bold: true });
    // cuerda (2 segmentos)
    var ropeCol = Tmax > 10 ? C.danger : (Tmax > 5 ? C.warning : C.rope);
    ctx.strokeStyle = ropeCol; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(mx(0), my(hA)); ctx.lineTo(mx(loadX), my(yP)); ctx.lineTo(mx(L), my(hB)); ctx.stroke();
    // anclajes
    [[0, hA, 'A', C.primary], [L, hB, 'B', C.info]].forEach(function (a) {
      draw.diamond(ctx, mx(a[0]), my(a[1]), 10, a[3]);
      draw.text(ctx, mx(a[0]), my(a[1]), a[2], C.bg, 10, { align: 'center', baseline: 'middle', bold: true });
      draw.text(ctx, mx(a[0]), my(yHi + plotH * 0.12), 'Anclaje ' + a[2], a[3], 11, { align: 'center', bold: true });
    });
    // tension arrows
    [[0, hA, TA], [L, hB, TB]].forEach(function (a) {
      var vx = loadX - a[0], vy = yP - a[1], nm = Math.hypot(vx, vy);
      if (nm < 1e-6) return;
      var alen = Math.max(Math.min(a[2] * 0.3, L * 0.25), L * 0.05);
      var ex = a[0] + alen * vx / nm, ey = a[1] + alen * vy / nm;
      draw.arrow(ctx, mx(a[0]), my(a[1]), mx(ex), my(ey), C.info, Math.max(1.5, Math.min(a[2] * 0.15, 4)), 12);
      draw.text(ctx, mx((a[0] + ex) / 2), my((a[1] + ey) / 2) - 8, 'T = ' + a[2].toFixed(1) + ' kN', C.info, 10, { align: 'center', bold: true });
    });
    // carga + W
    draw.dot(ctx, mx(loadX), my(yP), 7, C.warning, C.bg);
    var wLen = Math.min(W_kN * 0.4, plotH * 0.22);
    draw.arrow(ctx, mx(loadX), my(yP), mx(loadX), my(yP - wLen), C.danger, 2.5, 10);
    draw.text(ctx, mx(loadX) + 8, my(yP - wLen / 2), 'W = ' + W_kN.toFixed(2) + ' kN', C.danger, 10, { bold: true });
    // sag local
    var yLine = hA + (hB - hA) * loadX / L;
    draw.dashedLine(ctx, mx(loadX), my(yLine), mx(loadX), my(yP), C.warning, 1.5, [4, 3]);
    draw.text(ctx, mx(loadX) + 8, my((yLine + yP) / 2), 'd = ' + (yLine - yP).toFixed(1) + ' m', C.warning, 10);
    draw.text(ctx, WM / 2, HM - 158, 'Carga al ' + pos.toFixed(0) + '% del recorrido  (ángulo entre lados: ' + f.v_angle.toFixed(0) + '°)', C.primary, 11, { align: 'center', bold: true });

    // ── Curva ──
    var allT = prof.reduce(function (a, p) { return a.concat([p[1], p[2]]); }, []);
    var maxTcv = Math.min(Math.max(Math.max.apply(null, allT), NFPA * 1.1, 5.0), 80.0);
    function cx(pct) { return CRV.x0 + pct / 100 * CRV.w; }
    function cy(t) { return CRV.y0 + CRV.h - Math.min(t, maxTcv) / maxTcv * CRV.h; }
    // zonas
    [[0, NFPA, C.accent], [NFPA, MBS, C.warning], [MBS, 200, C.danger]].forEach(function (z) {
      ctx.save(); ctx.globalAlpha = 0.06; ctx.fillStyle = z[2];
      var yTop = cy(Math.min(z[1], maxTcv)), yBot = cy(z[0]);
      ctx.fillRect(cx(0), yTop, CRV.w, yBot - yTop); ctx.restore();
    });
    // ejes
    ctx.strokeStyle = C.anchor; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(cx(0), cy(0)); ctx.lineTo(cx(100), cy(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx(0), cy(0)); ctx.lineTo(cx(0), cy(maxTcv)); ctx.stroke();
    draw.text(ctx, CRV.x0 + CRV.w / 2, CRV.y0 + CRV.h + 22, 'Posición de la carga (%)', C.text, 10, { align: 'center' });
    draw.text(ctx, cx(0) - 6, cy(0), '0', C.text, 8, { align: 'right', baseline: 'middle' });
    draw.text(ctx, cx(0) - 6, cy(maxTcv), maxTcv.toFixed(0) + ' kN', C.text, 8, { align: 'right', baseline: 'middle' });
    // NFPA / MBS lines
    if (NFPA < maxTcv) { draw.dashedLine(ctx, cx(0), cy(NFPA), cx(100), cy(NFPA), C.danger, 1, [3, 3]); draw.text(ctx, cx(100), cy(NFPA) - 2, 'NFPA', C.danger, 7, { align: 'right', baseline: 'bottom' }); }
    if (MBS < maxTcv) { draw.dashedLine(ctx, cx(0), cy(MBS), cx(100), cy(MBS), C.danger, 1, [6, 4]); draw.text(ctx, cx(100), cy(MBS) - 2, 'MBS', C.danger, 7, { align: 'right', baseline: 'bottom' }); }
    // curves
    function plot(idx, col, dash) {
      ctx.save(); ctx.strokeStyle = col; ctx.lineWidth = 2.2; ctx.setLineDash(dash); ctx.beginPath();
      prof.forEach(function (p, i) { if (i === 0) ctx.moveTo(cx(p[0]), cy(p[idx])); else ctx.lineTo(cx(p[0]), cy(p[idx])); });
      ctx.stroke(); ctx.restore();
    }
    plot(1, C.primary, []); plot(2, C.info, [5, 3]);
    draw.dashedLine(ctx, cx(pos), cy(0), cx(pos), cy(maxTcv), C.warning, 1.5, [5, 3]);
    draw.dot(ctx, cx(pos), cy(TA), 6, C.primary, C.bg);
    draw.dot(ctx, cx(pos), cy(TB), 5, C.info, C.bg);
    // leyenda
    draw.text(ctx, cx(4), CRV.y0 + 4, '━ Anclaje A', C.primary, 8, { baseline: 'top' });
    draw.text(ctx, cx(4), CRV.y0 + 16, '╌ Anclaje B', C.info, 8, { baseline: 'top' });

    // ── Panel info ──
    var c = ctxI; draw.clear(c, WI, HI);
    var iy = 26, lh = 20;
    function wt(t, col, fs, bold) { if (t === '') { iy += lh * 0.5; return; } draw.text(c, 14, iy, t, col, fs || 11, { bold: bold }); iy += lh; }
    wt('DATOS', C.primary, 14, true); wt('');
    wt('Long. cuerda:    ' + S.toFixed(0) + ' m', C.primary, 11);
    wt('Flecha d:        ' + d.toFixed(2) + ' m', C.secondary, 11);
    wt('Distancia A↔B:   ' + L.toFixed(1) + ' m (calc.)', C.text, 11, true);
    wt('Peso:            ' + mass.toFixed(0) + ' kg (' + W_kN.toFixed(2) + ' kN)', C.danger, 11);
    wt('Altura anclaje A:' + hA.toFixed(1) + ' m', C.accent, 11);
    wt('Altura anclaje B:0.0 m (fijo)', C.grid, 11);
    wt('Posición carga:  ' + pos.toFixed(0) + '%', C.text, 11);
    wt('');
    wt('FUERZA EN CADA ANCLAJE', C.warning, 13, true);
    wt('Anclaje A = ' + TA.toFixed(2) + ' kN (' + (TA / W_kN).toFixed(1) + '× peso)', C.primary, 11, true);
    wt('Anclaje B = ' + TB.toFixed(2) + ' kN (' + (TB / W_kN).toFixed(1) + '× peso)', C.info, 11, true);
    wt('');
    if (Tmax > MBS) { wt('✗ SE PASA DE LA ROTURA', C.danger, 12, true); wt('  ¡La cuerda fallaría!', C.danger, 10, true); }
    else if (Tmax > NFPA) { wt('⚠ FUERZA ALTA', C.warning, 12, true); wt('  Riesgo elevado.', C.warning, 10); }
    else wt('✓ DENTRO DE LÍMITES SEGUROS', C.accent, 12, true);
    wt('');
    function tref(dv) {
      var d2 = Math.min(dv, 0.48 * S), L2 = Math.max(phys.spanForRope(S, d2, hA, hB), 1.0);
      var y2 = phys.solveLoadY(L2 / 2, L2, hA, hB, S);
      return phys.tyroleanForces(L2 / 2, L2, hA, hB, y2, W_kN).T_A;
    }
    wt('Con la carga al centro, según', C.text, 10, true);
    wt('la flecha de la cuerda:', C.text, 10, true);
    wt('  flecha 0.5 m → ' + tref(0.5).toFixed(1) + ' kN', C.danger, 10);
    wt('  flecha 1.5 m → ' + tref(1.5).toFixed(1) + ' kN', C.warning, 10);
    wt('  flecha 3.0 m → ' + tref(3.0).toFixed(1) + ' kN', C.accent, 10);
  }

  RS.controls('ctrls', [
    { id: 'span', label: 'Long. cuerda (m)', min: 10, max: 110, value: 31, step: 1, color: 'primary', decimals: 0 },
    { id: 'sag', label: 'Flecha d (m)', min: 0.3, max: 15, value: 1.5, step: 0.1, color: 'secondary', decimals: 1 },
    { id: 'load', label: 'Peso (kg)', min: 10, max: 300, value: 100, step: 1, color: 'warning', decimals: 0 },
    { id: 'hA', label: 'Altura A (m)', min: 0, max: 50, value: 0, step: 0.5, color: 'accent', decimals: 1 },
    { id: 'pos', label: 'Posición (%)', min: 1, max: 99, value: 50, step: 0.5, color: 'rope', decimals: 0 }
  ], render);

  render({ span: 31, sag: 1.5, load: 100, hA: 0, pos: 50 });
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
