<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Camilla en Tirolesa</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Camilla en Tirolesa', icon: 'fas fa-compress-arrows-alt' });
  var C = RS.COLORS, phys = RS.phys, viz = RS.viz, draw = RS.draw;
  var NFPA = RS.NFPA_WORK_LOAD, MBS = RS.ROPE_STATIC_MBS, CTRL = '#c85aff';

  root.innerHTML =
    '<h1>Tirolesa — Paso de Camilla</h1>' +
    '<p class="sim-sub">Carro sobre polea: la cuerda tiene UNA sola tensión T = W/(sin α_izq + sin α_der) (igual en A y B). La línea de control aporta la fuerza horizontal = T·(cos α_izq − cos α_der).</p>' +
    '<div class="sim-buttons" id="actions"></div>' +
    '<div class="sim-stage"><canvas id="cvM" width="720" height="500"></canvas><canvas id="cvI" width="400" height="500"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">NUNCA tensar la tirolesa "bien bonita": más flecha = menos fuerza = más seguro. La carga al centro da la máxima tensión de cuerda; cerca de un anclaje, más control.</p>';

  var cvM = document.getElementById('cvM'), cvI = document.getElementById('cvI');
  var ctxM = RS.setupCanvas(cvM), ctxI = RS.setupCanvas(cvI);
  var WM = cvM._cssW, HM = cvM._cssH, WI = cvI._cssW, HI = cvI._cssH;

  var st = { span: 30, sagPct: 5, mass: 100, pos: 0.5 };
  var auto = false, dir = 1;
  var api = null;

  var SC = { l: 55, r: WM - 55, tAnchor: 55, b: 285 };
  var GR = { x0: 55, y0: 320, w: WM - 90, h: 155 };

  function ropeLen() { return phys.highlineRopeLength(st.span, st.span * st.sagPct / 100); }
  function forcesAt(x) { var d = phys.solveSagAt(x, st.span, ropeLen()); return phys.highlinePulleyForces(x, st.span, d, st.mass); }

  function sceneX(m) { return SC.l + (m / st.span) * (SC.r - SC.l); }
  function sceneY(sag) {
    var dc = st.span * st.sagPct / 100, maxD = Math.max(dc * 2.5, 0.5);
    return SC.tAnchor + 25 + (sag / maxD) * (SC.b - SC.tAnchor - 55);
  }

  function drawScene(f) {
    var ctx = ctxM, L = st.span, d = f.d, S = ropeLen();
    var anchorY = sceneY(0);
    var loadPx = sceneX(f.x), loadPy = sceneY(d);
    var aL = [sceneX(0), anchorY], aR = [sceneX(L), anchorY];
    ctx.save(); ctx.fillStyle = '#101c12'; draw.rrect(ctx, SC.l - 5, SC.tAnchor - 10, SC.r - SC.l + 10, SC.b - SC.tAnchor + 20, 6); ctx.fill(); ctx.restore();
    draw.dashedLine(ctx, aL[0], anchorY, aR[0], anchorY, C.grid, 1, [3, 4]);
    // perfil sin carga
    ctx.strokeStyle = C.grid; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(aL[0], anchorY);
    for (var i = 0; i < 60; i++) { var r = (i + 0.5) / 60, dd = phys.solveSagAt(r * L, L, S); ctx.lineTo(sceneX(r * L), sceneY(dd)); }
    ctx.lineTo(aR[0], anchorY); ctx.stroke();
    // cuerda cargada
    var col = viz.tensionColor(f.T);
    ctx.strokeStyle = col; ctx.lineWidth = 4; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(aL[0], anchorY); ctx.lineTo(loadPx, loadPy); ctx.lineTo(aR[0], anchorY); ctx.stroke();
    // línea de control
    var fc = f.f_control;
    if (Math.abs(fc) > 0.005) {
      var toR = fc > 0, endX = toR ? SC.r - 10 : SC.l + 10;
      ctx.strokeStyle = CTRL; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(loadPx, loadPy); ctx.lineTo(endX, loadPy); ctx.stroke();
      var adx = toR ? 16 : -16;
      draw.arrow(ctx, loadPx, loadPy, loadPx + adx, loadPy, CTRL, 3, 10);
      draw.text(ctx, (loadPx + endX) / 2, loadPy - 6, 'control: ' + Math.abs(fc).toFixed(2) + ' kN', CTRL, 9, { align: 'center', baseline: 'bottom' });
    }
    // anclajes
    [[aL, 'Anclaje A'], [aR, 'Anclaje B']].forEach(function (a) {
      ctx.fillStyle = C.anchor; ctx.fillRect(a[0][0] - 8, a[0][1] - 8, 16, 16);
      ctx.strokeStyle = C.text; ctx.lineWidth = 2; ctx.strokeRect(a[0][0] - 8, a[0][1] - 8, 16, 16);
      draw.text(ctx, a[0][0], a[0][1] - 14, a[1], C.anchor, 9, { align: 'center', baseline: 'bottom' });
    });
    // tension arrows
    [[aL, f.T], [aR, f.T]].forEach(function (a) {
      var vx = loadPx - a[0][0], vy = loadPy - a[0][1], nm = Math.hypot(vx, vy); if (nm < 1) return;
      var ratio = Math.min(a[1] / MBS, 1), len = 30 + ratio * 60;
      draw.arrow(ctx, a[0][0], a[0][1], a[0][0] + len * vx / nm, a[0][1] + len * vy / nm, '#64b4ff', 2 + ratio * 3, 10);
      draw.text(ctx, a[0][0] + (len + 12) * vx / nm, a[0][1] + (len + 6) * vy / nm, a[1].toFixed(1) + ' kN', '#64b4ff', 9);
    });
    // arco V
    var vcol = viz.vAngleColor(f.v_angle), arcR = 32;
    var aLr = Math.atan2(-(anchorY - loadPy), aL[0] - loadPx), aRr = Math.atan2(-(anchorY - loadPy), aR[0] - loadPx);
    ctx.strokeStyle = vcol; ctx.lineWidth = 2; ctx.beginPath();
    var sA = Math.min(aLr, aRr), eA = Math.max(aLr, aRr);
    for (var k = 0; k <= 40; k++) { var a = sA + (eA - sA) * k / 40; var xx = loadPx + arcR * Math.cos(a), yy = loadPy - arcR * Math.sin(a); if (k === 0) ctx.moveTo(xx, yy); else ctx.lineTo(xx, yy); }
    ctx.stroke();
    var midA = (sA + eA) / 2;
    draw.text(ctx, loadPx + (arcR + 16) * Math.cos(midA), loadPy - (arcR + 16) * Math.sin(midA), f.v_angle.toFixed(0) + '°', vcol, 12, { align: 'center', baseline: 'middle', bold: true });
    // sag arrow
    draw.dashedLine(ctx, loadPx + 34, anchorY, loadPx + 34, loadPy, C.warning, 1, []);
    draw.text(ctx, loadPx + 40, (anchorY + loadPy) / 2, 'd=' + d.toFixed(2) + 'm', C.warning, 9, { baseline: 'middle' });
    // camilla
    draw.dot(ctx, loadPx, loadPy, 7, C.anchor, C.text);
    var ly = loadPy + 14, w = 54;
    ctx.fillStyle = vcol; draw.rrect(ctx, loadPx - w / 2, ly, w, 22, 4); ctx.fill();
    ctx.strokeStyle = C.text; ctx.lineWidth = 2; ctx.stroke();
    draw.dot(ctx, loadPx - 10, ly + 8, 5, C.primary);
    draw.text(ctx, loadPx + 4, ly + 11, st.mass + 'kg', C.text, 9);
    draw.arrow(ctx, loadPx, ly + 26, loadPx, ly + 52, C.danger, 2, 8);
    draw.text(ctx, loadPx + 8, ly + 42, 'W=' + f.W.toFixed(2) + 'kN', C.danger, 9);
    draw.text(ctx, loadPx, SC.b - 6, 'x = ' + f.x.toFixed(1) + ' m (' + (st.pos * 100).toFixed(0) + '%)', C.text, 9, { align: 'center' });
  }

  function drawGraph(f) {
    var ctx = ctxM, L = st.span, S = ropeLen();
    var prof = [];
    for (var i = 0; i < 120; i++) { var r = (i + 0.5) / 120, dd = phys.solveSagAt(r * L, L, S); prof.push(phys.highlinePulleyForces(r * L, L, dd, st.mass)); }
    var dataMax = 0; prof.forEach(function (p) { dataMax = Math.max(dataMax, p.T, Math.abs(p.f_control)); });
    var step = dataMax <= 11 ? 2 : (dataMax <= 28 ? 5 : 10);
    var yMax = Math.max(Math.ceil(dataMax * 1.25 / step) * step, step);
    ctx.save(); ctx.fillStyle = '#101c12'; draw.rrect(ctx, GR.x0 - 45, GR.y0 - 14, GR.w + 70, GR.h + 40, 6); ctx.fill(); ctx.restore();
    draw.text(ctx, GR.x0, GR.y0 - 14, 'Fuerza en la cuerda según dónde está la camilla', C.primary, 10, { baseline: 'top' });
    function gx(r) { return GR.x0 + r * GR.w; }
    function gy(v) { return GR.y0 + GR.h - Math.min(v, yMax) / yMax * GR.h; }
    for (var vv = step; vv <= yMax + 0.01; vv += step) { draw.dashedLine(ctx, gx(0), gy(vv), gx(1), gy(vv), C.grid, 1, []); draw.text(ctx, GR.x0 - 6, gy(vv), vv.toFixed(0), C.grid, 8, { align: 'right', baseline: 'middle' }); }
    [[NFPA, 'NFPA', C.warning], [MBS, 'rotura', C.danger]].forEach(function (lm) { if (lm[0] <= yMax) { draw.dashedLine(ctx, gx(0), gy(lm[0]), gx(1), gy(lm[0]), lm[2], 1, []); draw.text(ctx, gx(1) + 3, gy(lm[0]), lm[1], lm[2], 8, { baseline: 'middle' }); } });
    [['T', C.accent], ['f_control', CTRL]].forEach(function (d) {
      ctx.strokeStyle = d[1]; ctx.lineWidth = 3; ctx.beginPath();
      prof.forEach(function (p, i) { var y = gy(d[0] === 'T' ? p.T : Math.abs(p.f_control)); var x = gx((i + 0.5) / 120); if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y); });
      ctx.stroke();
    });
    draw.dashedLine(ctx, gx(st.pos), gy(0), gx(st.pos), gy(yMax), C.warning, 2, [5, 3]);
    draw.dot(ctx, gx(st.pos), gy(f.T), 6, C.accent);
    draw.dot(ctx, gx(st.pos), gy(Math.abs(f.f_control)), 6, CTRL);
    draw.text(ctx, gx(0) + 6, GR.y0 + 4, '━ Tensión cuerda (A=B): ' + f.T.toFixed(1) + ' kN', C.accent, 9, { baseline: 'top' });
    draw.text(ctx, gx(0) + 6, GR.y0 + 18, '━ Línea de control: ' + Math.abs(f.f_control).toFixed(2) + ' kN', CTRL, 9, { baseline: 'top' });
    ['A', 'centro', 'B'].forEach(function (lb, i) { draw.text(ctx, gx(i * 0.5), GR.y0 + GR.h + 6, lb, C.text, 9, { align: 'center', baseline: 'top' }); });
  }

  function drawPanel(f) {
    var c = ctxI; draw.clear(c, WI, HI);
    var y = 24, lh = 18, x = 14;
    function head(t, col) { draw.text(c, x, y, t, col || C.primary, 13, { bold: true }); y += 22; }
    function line(t, col) { draw.text(c, x + 4, y, t, col || C.text, 11); y += lh; }
    function sep() { draw.dashedLine(c, x, y, WI - 14, y, C.grid, 1, []); y += 8; }
    head('PARÁMETROS');
    line('Vano (L):      ' + st.span.toFixed(0) + ' m');
    line('Flecha centro: ' + (st.span * st.sagPct / 100).toFixed(2) + ' m (' + st.sagPct.toFixed(1) + '%)', C.warning);
    line('Carga:         ' + st.mass + ' kg (' + f.W.toFixed(2) + ' kN)', C.danger);
    line('Posición:      ' + f.x.toFixed(1) + ' m (' + (st.pos * 100).toFixed(0) + '%)');
    sep();
    head('ÁNGULOS');
    line('α izquierdo (A): ' + f.alpha_L_deg.toFixed(1) + '°');
    line('α derecho (B):   ' + f.alpha_R_deg.toFixed(1) + '°');
    var vcol = viz.vAngleColor(f.v_angle);
    draw.text(c, x + 4, y, 'Ángulo V = ' + f.v_angle.toFixed(1) + '°', vcol, 12, { bold: true }); y += 20;
    if (f.v_angle > 160) line('CRÍTICO: ángulo muy abierto', C.danger);
    else if (f.v_angle > 140) line('PELIGROSO: fuerzas muy altas', C.secondary);
    else if (f.v_angle > 120) line('PRECAUCIÓN: monitorear tensión', C.warning);
    else line('Ángulo aceptable', C.accent);
    sep();
    head('TENSIONES');
    line('Tensión cuerda (A=B): ' + f.T.toFixed(2) + ' kN', viz.tensionColor(f.T));
    line('Línea control: ' + Math.abs(f.f_control).toFixed(2) + ' kN', CTRL);
    sep();
    head('SEGURIDAD');
    var sf = f.T > 0 ? MBS / f.T : 999;
    line('NFPA: ' + f.T.toFixed(1) + (f.T <= NFPA ? ' ≤ ' : ' > ') + NFPA + ' kN', f.T <= NFPA ? C.accent : C.danger);
    line('FS rotura: ' + sf.toFixed(1) + ':1', sf >= 10 ? C.accent : (sf >= 3 ? C.warning : C.danger));
    var dMin = f.W * st.span / (4 * NFPA);
    line('Flecha mín. NFPA: ' + (dMin / st.span * 100).toFixed(1) + '% (' + dMin.toFixed(2) + ' m)', C.info);
  }

  function render() {
    var f = forcesAt(st.pos * st.span);
    drawScene(f); drawGraph(f); drawPanel(f);
  }

  var last = null;
  function loop(ts) {
    if (last === null) last = ts;
    var dt = Math.min((ts - last) / 1000, 0.05); last = ts;
    if (auto) {
      st.pos += dir * 0.15 * dt;
      if (st.pos >= 0.95) { st.pos = 0.95; dir = -1; } else if (st.pos <= 0.05) { st.pos = 0.05; dir = 1; }
      if (api) api.set('pos', st.pos * 100);
    }
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  api = RS.controls('ctrls', [
    { id: 'span', label: 'Vano (m)', min: 10, max: 150, value: 30, step: 5, color: 'primary', decimals: 0 },
    { id: 'sag', label: 'Flecha (%)', min: 0.5, max: 25, value: 5, step: 0.5, color: 'warning', decimals: 1 },
    { id: 'mass', label: 'Masa (kg)', min: 10, max: 500, value: 100, step: 10, color: 'danger', decimals: 0 },
    { id: 'pos', label: 'Posición (%)', min: 5, max: 95, value: 50, step: 1, color: 'rope', decimals: 0 }
  ], function (v) { st.span = v.span; st.sagPct = v.sag; st.mass = v.mass; if (!auto) st.pos = v.pos / 100; });

  var acts = document.getElementById('actions');
  var b = document.createElement('button'); b.className = 'sim-btn'; b.textContent = '▶ Travesía automática';
  b.addEventListener('click', function () { auto = !auto; b.classList.toggle('active', auto); b.textContent = auto ? '⏸ Detener travesía' : '▶ Travesía automática'; });
  acts.appendChild(b);

  render();
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
