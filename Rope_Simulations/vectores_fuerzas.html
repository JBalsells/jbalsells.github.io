<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Vectores y Fuerzas</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Vectores y Suma de Fuerzas', icon: 'fas fa-arrows-alt' });
  var C = RS.COLORS, phys = RS.phys, draw = RS.draw;

  root.innerHTML =
    '<h1>Sumar fuerzas: depende del ángulo</h1>' +
    '<p class="sim-sub">Cada flecha es una fuerza (cuánto tira y hacia dónde). La flecha gruesa es el total. Dos fuerzas en distinta dirección NO se suman como simples números.</p>' +
    '<div class="sim-buttons" id="vecBtns">' +
      '<button class="sim-btn" id="btnAdd">+ Agregar fuerza</button>' +
      '<button class="sim-btn" id="btnRem">− Eliminar fuerza</button>' +
      '<span id="vecCount" style="color:' + C.primary + ';font-size:0.82rem;"></span>' +
    '</div>' +
    '<div class="sim-stage"><canvas id="cv" width="1120" height="520"></canvas></div>' +
    '<div id="ctrls"></div>';

  var cv = document.getElementById('cv');
  var ctx = RS.setupCanvas(cv);
  var W = cv._cssW, H = cv._cssH;

  var VCOL = ['#00ff33', '#aaff44', '#00d9a0', '#ffcc00', '#ffb000', '#ff8844'];
  var MAX = 6, MIN = 1;
  var SUB = ['₀', '₁', '₂', '₃', '₄', '₅', '₆'];
  var vectors = [{ angle: -120, magnitude: 0.78 }, { angle: -60, magnitude: 0.78 }];
  var api = null;

  // Panel izquierdo: espacio lógico x[-3.5,3.5] y[-3.5,3.0]
  var PL = { x0: 10, w: 600, y0: 20, h: H - 40 };
  var LX0 = -3.5, LX1 = 3.5, LY0 = -3.5, LY1 = 3.0;
  function px(lx) { return PL.x0 + (lx - LX0) / (LX1 - LX0) * PL.w; }
  function py(ly) { return PL.y0 + (LY1 - ly) / (LY1 - LY0) * PL.h; }

  function drawVec(origin, ang, mag, color, label, scale) {
    var a = RS.rad(ang);
    var dx = scale * mag * Math.cos(a), dy = scale * mag * Math.sin(a);
    draw.arrow(ctx, px(origin[0]), py(origin[1]), px(origin[0] + dx), py(origin[1] + dy), color, 2.5, 12);
    var lx = Math.max(-3.1, Math.min(3.1, origin[0] + dx * 1.22));
    var ly = Math.max(-3.1, Math.min(2.8, origin[1] + dy * 1.22));
    draw.badge(ctx, px(lx), py(ly), [label, mag.toFixed(2) + ' kN'], color, 9);
    return [dx, dy];
  }

  function render(vals) {
    var n = vectors.length;
    var forces = [];
    for (var i = 0; i < n; i++) forces.push([vals['a' + i], vals['m' + i]]);
    var res = phys.resultant(forces.map(function (f) { return [f[0], f[1]]; }));

    draw.clear(ctx, W, H);
    // grid panel izq
    ctx.save(); ctx.strokeStyle = C.grid; ctx.globalAlpha = 0.5; ctx.lineWidth = 0.5;
    for (var gx = -3; gx <= 3; gx++) { ctx.beginPath(); ctx.moveTo(px(gx), py(LY0)); ctx.lineTo(px(gx), py(LY1)); ctx.stroke(); }
    for (var gy = -3; gy <= 2; gy++) { ctx.beginPath(); ctx.moveTo(px(LX0), py(gy)); ctx.lineTo(px(LX1), py(gy)); ctx.stroke(); }
    ctx.restore();
    // ejes
    draw.dashedLine(ctx, px(LX0), py(0), px(LX1), py(0), C.grid, 1, [4, 4]);
    draw.dashedLine(ctx, px(0), py(LY0), px(0), py(LY1), C.grid, 1, [4, 4]);
    // anclaje
    ctx.fillStyle = C.anchor; ctx.fillRect(px(0) - 7, py(0) - 7, 14, 14);
    draw.dot(ctx, px(0), py(0), 3, C.text);

    var maxm = Math.max.apply(null, forces.map(function (f) { return f[1]; }).concat([1.5]));
    var scale = 2.5 / Math.max(res.R, maxm, 1.5);
    var dxs = [], dys = [];
    for (var k = 0; k < n; k++) {
      var d = drawVec([0, 0], forces[k][0], forces[k][1], VCOL[k % VCOL.length], 'F' + SUB[k + 1], scale);
      dxs.push(d[0]); dys.push(d[1]);
    }
    var tdx = dxs.reduce(function (s, v) { return s + v; }, 0);
    var tdy = dys.reduce(function (s, v) { return s + v; }, 0);

    if (n === 2) {
      ctx.save(); ctx.setLineDash([4, 4]); ctx.globalAlpha = 0.4;
      ctx.strokeStyle = VCOL[1]; ctx.beginPath();
      ctx.moveTo(px(dxs[0]), py(dys[0])); ctx.lineTo(px(dxs[0] + dxs[1]), py(dys[0] + dys[1])); ctx.stroke();
      ctx.strokeStyle = VCOL[0]; ctx.beginPath();
      ctx.moveTo(px(dxs[1]), py(dys[1])); ctx.lineTo(px(dxs[0] + dxs[1]), py(dys[0] + dys[1])); ctx.stroke();
      ctx.restore();
    }
    if (res.R > 0.01) {
      draw.arrow(ctx, px(0), py(0), px(tdx), py(tdy), C.warning, 3.5, 16);
      var tx = Math.max(-3.1, Math.min(3.1, tdx * 1.15)), ty = Math.max(-3.1, Math.min(2.7, tdy * 1.15));
      draw.badge(ctx, px(tx), py(ty), ['R = ' + res.R.toFixed(2) + ' kN'], C.warning, 11);
    }

    // Panel info derecho
    var ix = 660, iy = 40, lh = 22;
    function wt(t, col, fs, bold) { if (t === '') { iy += lh * 0.5; return; } draw.text(ctx, ix, iy, t, col, fs || 12, { bold: bold }); iy += lh; }
    wt('RESULTADO', C.primary, 15, true); wt('');
    for (var j = 0; j < n; j++) wt('Fuerza ' + (j + 1) + ':  ' + forces[j][1].toFixed(2) + ' kN  hacia ' + (forces[j][0] >= 0 ? '+' : '') + forces[j][0].toFixed(0) + '°', VCOL[j % VCOL.length], 11);
    wt('');
    wt('Juntas tiran con:  ' + res.R.toFixed(2) + ' kN', C.warning, 14, true);
    wt('en dirección ' + res.angle_deg.toFixed(0) + '°', C.warning, 11);
    wt('');
    var sumArith = forces.reduce(function (s, f) { return s + f[1]; }, 0);
    wt('Sumando los números:        ' + sumArith.toFixed(2) + ' kN', C.text, 11);
    wt('Total real (por el ángulo): ' + res.R.toFixed(2) + ' kN', C.text, 11);
    if (sumArith - res.R > 0.05) wt('El ángulo se "comió" parte de la fuerza.', C.info, 10);
    wt('');
    if (n >= 2) {
      var angs = forces.map(function (f) { return f[0]; }), spread = 0;
      for (var a1 = 0; a1 < angs.length; a1++) for (var a2 = a1 + 1; a2 < angs.length; a2++) {
        var dd = Math.abs(angs[a1] - angs[a2]); if (dd > 180) dd = 360 - dd; spread = Math.max(spread, dd);
      }
      if (spread < 60) { wt('Ángulo entre ellas: ' + spread.toFixed(0) + '°', C.accent, 11); wt('Apuntan casi igual: se suman bien.', C.accent, 10); }
      else if (spread < 120) { wt('Ángulo entre ellas: ' + spread.toFixed(0) + '°', C.warning, 11); wt('Bastante abiertas: el total baja.', C.warning, 10); }
      else { wt('Ángulo entre ellas: ' + spread.toFixed(0) + '°', C.danger, 11); wt('Casi opuestas: se cancelan entre sí.', C.danger, 10); }
    } else wt('Agregá otra fuerza para comparar.', C.grid, 10);
  }

  function rebuild() {
    document.getElementById('ctrls').innerHTML = '';
    var specs = [];
    vectors.forEach(function (v, i) {
      var c = VCOL[i % VCOL.length];
      specs.push({ id: 'a' + i, label: 'F' + (i + 1) + ' ángulo (°)', min: -180, max: 180, value: v.angle, step: 1, color: c, decimals: 0 });
      specs.push({ id: 'm' + i, label: 'F' + (i + 1) + ' fuerza (kN)', min: 0.1, max: 10, value: v.magnitude, step: 0.05, color: c, decimals: 2 });
    });
    api = RS.controls('ctrls', specs, function (vals) { syncFromVals(vals); render(vals); });
    document.getElementById('vecCount').textContent = 'Fuerzas: ' + vectors.length + '/' + MAX;
    document.getElementById('btnAdd').disabled = vectors.length >= MAX;
    document.getElementById('btnRem').disabled = vectors.length <= MIN;
    render(api.values());
  }
  function syncFromVals(vals) {
    vectors.forEach(function (v, i) { v.angle = vals['a' + i]; v.magnitude = vals['m' + i]; });
  }
  document.getElementById('btnAdd').addEventListener('click', function () {
    if (vectors.length < MAX) { syncFromVals(api.values()); vectors.push({ angle: -90, magnitude: 0.78 }); rebuild(); }
  });
  document.getElementById('btnRem').addEventListener('click', function () {
    if (vectors.length > MIN) { syncFromVals(api.values()); vectors.pop(); rebuild(); }
  });

  rebuild();
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
