<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Sistema English Reeve</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Sistema English Reeve', icon: 'fas fa-compress-arrows-alt' });
  var C = RS.COLORS, G = RS.G, phys = RS.phys, draw = RS.draw;
  var GOLD = '#f0c337';

  root.innerHTML =
    '<h1>English Reeve — Tirolesa de rescate controlada</h1>' +
    '<p class="sim-sub">Montaje real: polea de travesía → placa de reparto → bagas en V → mosquetón máster → víctima. Anclajes a nivel (vano A–B). VM horizontal (tirar) y vertical (izar).</p>' +
    '<div class="sim-buttons" id="maBtns"></div>' +
    '<div class="sim-stage"><canvas id="cvS" width="700" height="520"></canvas><canvas id="cvP" width="400" height="520"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">T_A / T_B: tensiones de la highline en cada anclaje. Belay = línea de seguridad independiente. Más flecha = menos tensión.</p>';

  var cvS = document.getElementById('cvS'), cvP = document.getElementById('cvP');
  var ctxS = RS.setupCanvas(cvS), ctxP = RS.setupCanvas(cvP);
  var WS = cvS._cssW, HS = cvS._cssH, WP = cvP._cssW, HP = cvP._cssH;

  var st = { pos: 50, load: 120, span: 40, sag: 5, drop: 8, maH: 4, maV: 3 };

  function compute() {
    var span = st.span, hA = 0, d = st.sag / 100 * span;
    var S = phys.ropeLengthForSag(span, hA, 0, d);
    var x = st.pos / 100 * span;
    var yP = phys.solveLoadY(x, span, hA, 0, S);
    var W = phys.weightKn(st.load);
    var f = phys.tyroleanForces(x, span, hA, 0, yP, W);
    var Fhaul = W * Math.sin(RS.rad(Math.abs(f.alpha_B))) / st.maH;
    var Fvert = W / st.maV;
    return { span: span, hA: hA, d: d, x: x, yP: yP, W: W, f: f, Fhaul: Fhaul, Fvert: Fvert, drop: st.drop };
  }

  function pulley(ctx, x, y, r, col) { ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.stroke(); draw.dot(ctx, x, y, 2, col); }
  function anchorPin(ctx, x, y, letra, col) {
    draw.diamond(ctx, x, y, 11, col);
    draw.text(ctx, x, y, letra, C.bg, 10, { align: 'center', baseline: 'middle', bold: true });
    draw.text(ctx, x - 28, y - 18, 'Anclaje ' + letra, col, 9, { bold: true });
  }

  function drawScene(s) {
    var ctx = ctxS; draw.clear(ctx, WS, HS);
    var span = s.span, hA = s.hA, d = s.d, drop = s.drop;
    var top_m = Math.max(hA, 0) + 1.0, bot_m = (hA / 2 - d) - drop - 1.5;
    var Lx = 70, Rx = WS - 70, Ty = 70, By = HS - 70;
    var ppm = Math.min((Rx - Lx) / Math.max(span, 1), (By - Ty) / Math.max(top_m - bot_m, 1));
    function X(m) { return Lx + m * ppm; }
    function Y(m) { return Ty + (top_m - m) * ppm; }
    var ax = X(0), ay = Y(hA), bx = X(span), by = Y(0);
    var cx = X(s.x), cy = Y(s.yP), masterY = cy + 30, vicY = Y(s.yP - drop);
    // acantilados
    ctx.fillStyle = '#1a261c'; ctx.fillRect(0, ay + 8, ax + 30, HS); ctx.fillRect(bx - 30, by + 8, WS, HS);
    ctx.strokeStyle = '#3c5a3c'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(0, ay + 8); ctx.lineTo(ax + 30, ay + 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(bx - 30, by + 8); ctx.lineTo(WS, by + 8); ctx.stroke();
    draw.text(ctx, WS / 2, By + 22, 'CAÑÓN / ABISMO', C.anchor, 8, { align: 'center' });
    // belay
    ctx.strokeStyle = C.accent; ctx.globalAlpha = 0.8; ctx.lineWidth = 3; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(ax + 6, ay); ctx.lineTo(cx - 16, cy - 4); ctx.lineTo(cx - 16, vicY); ctx.stroke(); ctx.globalAlpha = 1;
    // highline
    ctx.strokeStyle = C.rope; ctx.lineWidth = 5; ctx.lineJoin = 'round';
    ctx.beginPath(); ctx.moveTo(ax, ay); ctx.lineTo(cx, cy); ctx.lineTo(bx, by); ctx.stroke();
    // control line
    ctx.strokeStyle = C.info; ctx.lineWidth = 2.5; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(bx + 6, by - 26); ctx.stroke();
    pulley(ctx, bx + 6, by - 26, 6, C.info);
    // anclajes
    anchorPin(ctx, ax, ay, 'A', C.warning); anchorPin(ctx, bx, by, 'B', C.info);
    // carro
    pulley(ctx, cx, cy, 11, C.primary); draw.dot(ctx, cx, cy, 3, C.primary);
    var plateY = cy + 16;
    ctx.strokeStyle = C.primary; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(cx, cy + 11); ctx.lineTo(cx, plateY - 4); ctx.stroke();
    ctx.fillStyle = C.secondary; draw.rrect(ctx, cx - 12, plateY - 5, 24, 11, 4); ctx.fill();
    [-6, 0, 6].forEach(function (dx) { draw.dot(ctx, cx + dx, plateY, 2, C.bg); });
    ctx.strokeStyle = GOLD; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - 8, plateY + 6); ctx.lineTo(cx, masterY); ctx.moveTo(cx + 8, plateY + 6); ctx.lineTo(cx, masterY); ctx.stroke();
    pulley(ctx, cx, masterY, 5, C.primary);
    // lift line
    ctx.strokeStyle = GOLD; ctx.lineWidth = 4; ctx.beginPath(); ctx.moveTo(cx, masterY); ctx.lineTo(cx, vicY); ctx.stroke();
    // víctima
    var w = 78, h = 30;
    ctx.fillStyle = '#461616'; draw.rrect(ctx, cx - w / 2, vicY, w, h, 7); ctx.fill();
    ctx.strokeStyle = C.danger; ctx.lineWidth = 2; ctx.stroke();
    draw.dot(ctx, cx - w / 2 + 13, vicY + h / 2, 6, C.text);
    ctx.strokeStyle = C.text; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(cx - w / 2 + 19, vicY + h / 2); ctx.lineTo(cx + w / 2 - 12, vicY + h / 2); ctx.stroke();
    draw.text(ctx, cx - 18, vicY + h + 14, st.load.toFixed(0) + ' kg', C.warning, 9);
    // peso
    var wy = vicY + 34;
    draw.arrow(ctx, cx, wy, cx, wy + 26, C.danger, 3, 9);
    draw.text(ctx, cx + 8, wy + 20, s.W.toFixed(2) + ' kN', C.danger, 9, { bold: true });
  }

  function drawPanel(s) {
    var c = ctxP; draw.clear(c, WP, HP);
    var x = 16, y = 30, lh = 22, f = s.f;
    var vcol = f.v_angle < 120 ? C.accent : (f.v_angle < 150 ? C.warning : C.danger);
    function head(t) { draw.text(c, x, y, t, C.primary, 13, { bold: true }); y += 22; }
    function line(t, col) { draw.text(c, x + 4, y, t, col || C.text, 12); y += lh; }
    head('Tensiones highline');
    line('T_A (A→carro): ' + f.T_A.toFixed(2) + ' kN', C.warning);
    line('T_B (carro→B): ' + f.T_B.toFixed(2) + ' kN', C.warning);
    line('Ángulo V: ' + f.v_angle.toFixed(0) + '°', vcol);
    y += 8;
    head('Fuerza para operar');
    line('Tirar (horiz.): ' + s.Fhaul.toFixed(2) + ' kN (' + (s.Fhaul * 1000 / G).toFixed(0) + ' kg)', C.info);
    line('Izar (vert.): ' + s.Fvert.toFixed(2) + ' kN (' + (s.Fvert * 1000 / G).toFixed(0) + ' kg)', GOLD);
    y += 8;
    head('Cargas en anclajes');
    line('Anclaje A: ' + f.T_A.toFixed(2) + ' kN', C.warning);
    line('Anclaje B: ' + f.T_B.toFixed(2) + ' kN', C.warning);
    line('Belay: ' + s.W.toFixed(2) + ' kN', C.accent);
    y += 12;
    head('Ventaja mecánica');
    line('Horizontal (tirar): ' + st.maH + ':1', C.text);
    line('Vertical (izar): ' + st.maV + ':1', C.text);
  }

  function render() { var s = compute(); drawScene(s); drawPanel(s); }

  // botones VM
  var mb = document.getElementById('maBtns');
  function label(txt) { var sp = document.createElement('span'); sp.textContent = txt; sp.style.cssText = 'color:' + C.text + ';font-size:0.8rem;margin:0 4px;'; mb.appendChild(sp); }
  label('VM horizontal:');
  RS.buttonGroup('maBtns', [{ label: '3:1', value: 3 }, { label: '4:1', value: 4 }, { label: '6:1', value: 6 }], 4, function (v) { st.maH = v; render(); });
  label('  VM vertical:');
  RS.buttonGroup('maBtns', [{ label: '2:1', value: 2 }, { label: '3:1', value: 3 }, { label: '4:1', value: 4 }], 3, function (v) { st.maV = v; render(); });

  RS.controls('ctrls', [
    { id: 'pos', label: 'Posición (%)', min: 2, max: 98, value: 50, step: 1, color: 'info', decimals: 0 },
    { id: 'load', label: 'Carga (kg)', min: 40, max: 300, value: 120, step: 5, color: 'danger', decimals: 0 },
    { id: 'span', label: 'Vano A–B (m)', min: 15, max: 80, value: 40, step: 1, color: 'primary', decimals: 0 },
    { id: 'sag', label: 'Flecha (%)', min: 1, max: 12, value: 5, step: 0.5, color: 'secondary', decimals: 1 },
    { id: 'drop', label: 'Cuelgue (m)', min: 0, max: 15, value: 8, step: 0.5, color: 'rope', decimals: 1 }
  ], function (v) { st.pos = v.pos; st.load = v.load; st.span = v.span; st.sag = v.sag; st.drop = v.drop; render(); });

  render();
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
