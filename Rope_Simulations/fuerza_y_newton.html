<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — ¿Qué es un Newton?</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: '¿Qué es un Newton?', icon: 'fas fa-weight-hanging' });
  var C = RS.COLORS, G = RS.G, phys = RS.phys, draw = RS.draw;

  root.innerHTML =
    '<h1>¿Qué es un Newton?</h1>' +
    '<p class="sim-sub">El Newton (N) mide la FUERZA. El peso es una fuerza; al caer y frenar de golpe, esa fuerza se multiplica.</p>' +
    '<div class="sim-stage"><canvas id="cv" width="1120" height="470"></canvas></div>' +
    '<p class="sim-sub" id="sFall" style="color:' + C.rope + ';margin:2px auto 0;font-weight:700;"></p>' +
    '<p class="sim-sub" id="sBrake" style="color:' + C.danger + ';margin:2px auto 8px;font-weight:700;"></p>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">1 N ≈ una manzana&nbsp;│&nbsp;1 kN = 1000 N&nbsp;│&nbsp;frenar más rápido = golpe más fuerte</p>';

  var cv = document.getElementById('cv');
  var ctx = RS.setupCanvas(cv);
  var W = cv._cssW, H = cv._cssH;

  var REF = [
    [1.0, 'Una manzana (~0.1 kg)', C.accent],
    [98.0, 'Mochila (10 kg)', C.info],
    [687.0, 'Una persona (70 kg)', C.rope],
    [1570.0, 'Rescatista + paciente (160 kg)', C.secondary],
    [RS.NFPA_WORK_LOAD * 1000, 'Carga máx. de trabajo (cuerda)', C.warning],
    [RS.ROPE_STATIC_MBS * 1000, 'Lo que ROMPE la cuerda', C.danger]
  ];

  function drawAnswer(x0, w, mass) {
    var F_N = mass * G, kN = phys.weightKn(mass);
    var apples = Math.max(1, Math.round(F_N));
    var cx = x0 + w / 2;
    draw.text(ctx, cx, 34, 'El peso de…', C.text, 13, { align: 'center' });
    draw.rrect(ctx, cx - 70, 48, 140, 40, 8);
    ctx.fillStyle = C.panel; ctx.fill();
    ctx.strokeStyle = C.primary; ctx.lineWidth = 2; ctx.stroke();
    draw.text(ctx, cx, 74, mass.toFixed(0) + ' kg', C.primary, 22, { align: 'center', baseline: 'middle', bold: true });
    draw.arrow(ctx, cx, 96, cx, 128, C.danger, 3, 12);
    draw.text(ctx, cx + 14, 116, 'tira hacia abajo', C.danger, 10);
    draw.text(ctx, cx, 200, F_N.toLocaleString('es', { maximumFractionDigits: 0 }) + ' N', C.primary, 46, { align: 'center', baseline: 'middle', bold: true });
    draw.text(ctx, cx, 245, '=  ' + kN.toFixed(2) + ' kN', C.accent, 22, { align: 'center', baseline: 'middle', bold: true });
    draw.text(ctx, cx, 300, 'peso = masa × gravedad', C.text, 13, { align: 'center' });
    draw.text(ctx, cx, 324, mass.toFixed(0) + ' kg × 9.81 = ' + F_N.toLocaleString('es', { maximumFractionDigits: 0 }) + ' N', C.text, 13, { align: 'center' });
    draw.text(ctx, cx, 372, 'Es como colgar unas ' + apples.toLocaleString('es') + ' manzanas.', C.rope, 12, { align: 'center', italic: true });
  }

  function drawReference(x0, w, mass, F_imp_N) {
    var F_N = mass * G;
    var top = 44, bottom = H - 60, n = REF.length;
    var rowH = (bottom - top) / n;
    var lo = 0.7, hi = 80000;
    var lx = x0 + 250, rx = x0 + w - 20;
    function mapX(v) {
      v = Math.max(lo, Math.min(hi, v));
      return lx + (Math.log(v) - Math.log(lo)) / (Math.log(hi) - Math.log(lo)) * (rx - lx);
    }
    draw.text(ctx, x0 + w / 2, 24, '¿Cuánta fuerza es eso? Compárala:', C.primary, 13, { align: 'center', bold: true });
    for (var i = 0; i < n; i++) {
      var yv = top + (n - 1 - i) * rowH + rowH / 2;
      var val = REF[i][0];
      ctx.fillStyle = REF[i][2]; ctx.globalAlpha = 0.85;
      ctx.fillRect(lx, yv - rowH * 0.26, mapX(val) - lx, rowH * 0.52);
      ctx.globalAlpha = 1;
      draw.text(ctx, x0 + 8, yv, REF[i][1], C.text, 10, { baseline: 'middle' });
      var txt = val >= 1000 ? (val / 1000).toFixed(0) + ' kN' : val.toFixed(0) + ' N';
      draw.text(ctx, mapX(val) + 5, yv, txt, C.text, 9, { baseline: 'middle' });
    }
    var px = mapX(F_N);
    draw.dashedLine(ctx, px, top - 6, px, bottom, C.primary, 2, [5, 4]);
    draw.text(ctx, px, top - 10, 'tu peso', C.primary, 10, { align: 'center', baseline: 'bottom', bold: true });
    if (F_imp_N > F_N * 1.08) {
      var bx = mapX(F_imp_N);
      draw.dashedLine(ctx, bx, top, bx, bottom + 6, C.danger, 2, [5, 4]);
      draw.text(ctx, bx, bottom + 10, 'el golpe al frenar', C.danger, 9, { align: 'center', baseline: 'top', bold: true });
    }
  }

  function render(v) {
    var m = v.mass, h = v.height, t = v.brake;
    var vel = phys.impactVelocity(h);
    var F_imp_N = m * (G + (vel > 0 ? vel / t : 0));
    var factor = F_imp_N / (m * G);
    draw.clear(ctx, W, H);
    draw.dashedLine(ctx, W * 0.48, 20, W * 0.48, H - 20, C.grid, 1, [3, 5]);
    drawAnswer(0, W * 0.46, m);
    drawReference(W * 0.50, W * 0.50, m, F_imp_N);
    var sFall = document.getElementById('sFall'), sBrake = document.getElementById('sBrake');
    if (vel > 0) {
      sFall.textContent = 'Si cae de ' + h.toFixed(1) + ' m → llega a ' + vel.toFixed(1) + ' m/s (' + (vel * 3.6).toFixed(0) + ' km/h)';
      sBrake.textContent = 'Si lo frenás en ' + t.toFixed(1) + ' s → el golpe es ' + (F_imp_N / 1000).toFixed(2) + ' kN (×' + factor.toFixed(1) + ' su peso)';
    } else {
      sFall.textContent = 'Subí "Altura" para soltarlo y ver la caída.';
      sBrake.textContent = '';
    }
  }

  RS.controls('ctrls', [
    { id: 'mass', label: 'Peso (kg)', min: 1, max: 250, value: 70, step: 1, color: 'primary', decimals: 0 },
    { id: 'height', label: 'Altura (m)', min: 0, max: 10, value: 2, step: 0.5, color: 'rope', decimals: 1 },
    { id: 'brake', label: 'Frenar (s)', min: 0.1, max: 2.0, value: 0.5, step: 0.1, color: 'danger', decimals: 1 }
  ], render);

  render({ mass: 70, height: 2, brake: 0.5 });
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
