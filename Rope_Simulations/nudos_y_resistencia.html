<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Nudos y Resistencia</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Nudos y Resistencia', icon: 'fas fa-infinity' });
  var C = RS.COLORS, phys = RS.phys, draw = RS.draw;
  var EFF_MIN = 75, NFPA = RS.NFPA_WORK_LOAD;

  var KNOTS = [
    ['Sin nudo', 100, 'Referencia: resistencia total de la cuerda'],
    ['Nudo en ocho', 80, 'El más usado en rescate. Estándar NFPA/UIAA.'],
    ['Ocho en seno', 78, 'Bucle en el seno de la cuerda. No la corta.'],
    ['Ocho doble (orejas)', 77, 'Dos gazas simultáneas. Ideal para anclajes en Y.'],
    ['As de guía (Bowline)', 75, 'Anclaje rápido en extremo.'],
    ['As de guía doble', 72, 'Más seguro ante cargas variables.'],
    ['Nudo dinámico (HMS)', 70, 'Freno y rappel reversible.'],
    ['Pescador doble', 70, 'Unión de dos cuerdas. Muy seguro.'],
    ['Zeppelin (bend)', 68, 'Unión segura, fácil de deshacer bajo carga.'],
    ['Mariposa alpina', 68, 'Nudo de línea media, tres direcciones.'],
    ['Pescador simple', 65, 'Menos seguro que el doble.'],
    ['Ballestrinque', 65, 'Anclaje rápido. Puede deslizar.'],
    ['Prusik', 65, 'Fricción para ascenso y bloqueo.'],
    ['Klemheist', 63, 'Fricción unidireccional con cinta.'],
    ['Bachmann', 62, 'Fricción con mosquetón, ajustable.'],
    ['Garda (Ratchet)', 60, 'Trinquete: carga en un solo sentido.'],
    ['Nudo simple', 60, 'El más débil. Solo tope de emergencia.'],
    ['Nudo de agua', 55, 'Para cintas/slings. Revisar antes de usar.'],
    ['Nudo plano', 45, 'PELIGROSO: se desliza. NO usar en rescate.']
  ];

  root.innerHTML =
    '<h1>Nudos: cuánta resistencia le quitan a la cuerda</h1>' +
    '<p class="sim-sub" style="color:' + C.warning + ';font-style:italic;">Todo nudo debilita la cuerda. Verde = aguanta bien; rojo = aguanta poco.</p>' +
    '<div class="sim-stage"><canvas id="cv" width="1120" height="660"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">verde ≥75% aceptable&nbsp;│&nbsp;ámbar 60–75% con precaución&nbsp;│&nbsp;rojo &lt;60% evitar en rescate&nbsp;│&nbsp;MBS_nudo = MBS · eficiencia/100</p>';

  var cv = document.getElementById('cv');
  var ctx = RS.setupCanvas(cv);
  var W = cv._cssW, H = cv._cssH;

  function knotColor(eff) { return eff >= EFF_MIN ? C.accent : (eff >= 60 ? C.warning : C.danger); }

  function render(v) {
    var mbs = v.mbs;
    draw.clear(ctx, W, H);
    var PAD = { l: 200, r: 130, t: 40, b: 30 };
    var pw = W - PAD.l - PAD.r, ph = H - PAD.t - PAD.b, n = KNOTS.length;
    var rowH = ph / n;
    function px(pct) { return PAD.l + pct / 100 * pw; }
    // zonas
    [[0, 60, C.danger], [60, EFF_MIN, C.warning], [EFF_MIN, 100, C.accent]].forEach(function (z) {
      ctx.save(); ctx.globalAlpha = 0.08; ctx.fillStyle = z[2];
      ctx.fillRect(px(z[0]), PAD.t, px(z[1]) - px(z[0]), ph); ctx.restore();
    });
    // etiquetas de zona
    draw.text(ctx, px(30), PAD.t - 6, 'Evitar en rescate', C.danger, 9, { align: 'center', italic: true });
    draw.text(ctx, px(67.5), PAD.t - 6, 'Con precaución', C.warning, 9, { align: 'center', italic: true });
    draw.text(ctx, px(87.5), PAD.t - 6, 'Aceptable en rescate', C.accent, 9, { align: 'center', italic: true });
    // líneas ref
    draw.dashedLine(ctx, px(EFF_MIN), PAD.t, px(EFF_MIN), PAD.t + ph, C.warning, 1.8, [6, 4]);
    draw.dashedLine(ctx, px(60), PAD.t, px(60), PAD.t + ph, C.danger, 1.2, [2, 3]);
    var nfpaEff = NFPA / mbs * 100;
    if (nfpaEff > 0 && nfpaEff < 100) {
      draw.dashedLine(ctx, px(nfpaEff), PAD.t, px(nfpaEff), PAD.t + ph, C.secondary, 1.6, [8, 3]);
      draw.text(ctx, px(nfpaEff) + 3, PAD.t + 4, 'NFPA ' + NFPA.toFixed(1) + ' kN', C.secondary, 8, { baseline: 'top' });
    }
    // barras
    KNOTS.forEach(function (k, i) {
      var eff = k[1], color = knotColor(eff), y = PAD.t + i * rowH + rowH / 2;
      var kn = mbs * eff / 100;
      ctx.save(); ctx.globalAlpha = 0.9; ctx.fillStyle = color;
      ctx.fillRect(px(0), y - rowH * 0.3, px(eff) - px(0), rowH * 0.6);
      ctx.restore();
      if (eff < 60) { ctx.strokeStyle = color; ctx.lineWidth = 2; ctx.strokeRect(px(0), y - rowH * 0.3, px(eff) - px(0), rowH * 0.6); }
      // nombre
      draw.text(ctx, PAD.l - 8, y, k[0], eff < 60 ? C.danger : C.text, 10, { align: 'right', baseline: 'middle', bold: eff < 60 });
      // valor
      draw.text(ctx, px(eff) + 6, y, eff + '%  →  ' + kn.toFixed(1) + ' kN', color, 9.5, { baseline: 'middle', bold: true });
      // desc dentro
      if (eff >= 40) draw.text(ctx, px(eff * 0.5), y, k[2], C.bg, 7, { align: 'center', baseline: 'middle' });
      if (eff < 50) draw.text(ctx, px(eff * 0.25), y - 8, '⚠ NO RESCATE', C.white, 7, { align: 'center', baseline: 'middle', bold: true });
    });
    // eje x
    [0, 25, 50, 60, EFF_MIN, 100].forEach(function (t) {
      draw.text(ctx, px(t), PAD.t + ph + 6, t + '%', C.text, 9.5, { align: 'center', baseline: 'top' });
    });
  }

  RS.controls('ctrls', [
    { id: 'mbs', label: 'Resistencia cuerda (kN)', min: 5, max: 40, value: 30, step: 0.5, color: 'rope', decimals: 1 }
  ], render);

  render({ mbs: 30 });
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
