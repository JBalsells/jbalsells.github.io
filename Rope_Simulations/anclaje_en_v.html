<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Anclaje en V</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Anclaje en V', icon: 'fas fa-drafting-compass' });
  var C = RS.COLORS, G = RS.G, phys = RS.phys, draw = RS.draw;
  var C1 = C.primary, C2 = C.secondary;  // izquierdo / derecho

  root.innerHTML =
    '<h1>Anclaje en V: cuanto más abierta, más fuerza</h1>' +
    '<p class="warning-bar">REGLA DE ORO: mantené la V angosta (menos de 90°). Cuanto más se abre, más fuerza aguanta cada lado; pasando 120° es peligroso.</p>' +
    '<div class="sim-stage"><canvas id="cvD" width="440" height="492"></canvas><canvas id="cvC" width="670" height="492"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">Caso simétrico (φ=0): F = W / (2·cos θ/2)&nbsp;│&nbsp;Brazo flojo cuando |φ| ≥ θ/2&nbsp;│&nbsp;"Descentrar" carga más un lado.</p>';

  var cvD = document.getElementById('cvD'), cvC = document.getElementById('cvC');
  var ctxD = RS.setupCanvas(cvD), ctxC = RS.setupCanvas(cvC);
  var WD = cvD._cssW, HD = cvD._cssH, WC = cvC._cssW, HC = cvC._cssH;

  function armColor(T, W) {
    if (T <= 0) return C.grid;
    var r = W > 0 ? T / W : 0;
    if (r > 1.0) return C.danger;
    if (r > 0.75) return C.warning;
    return C.rope;
  }

  function drawDiagram(theta, mass, phi) {
    var t = phys.vAnchorTensions(mass * G / 1000, theta, phi);
    var W_kN = mass * G / 1000, T1 = t[0], T2 = t[1];
    var r1 = W_kN > 0 ? T1 / W_kN : 0, r2 = W_kN > 0 ? T2 / W_kN : 0;
    var col1 = armColor(T1, W_kN), col2 = armColor(T2, W_kN);
    var ctx = ctxD;
    draw.clear(ctx, WD, HD);
    // espacio lógico x[-2.5,2.5] y[-2.9,1.5]
    var PAD = { l: 30, r: 22, t: 38, b: 55 };
    var sx = (WD - PAD.l - PAD.r) / 5.0, sy = (HD - PAD.t - PAD.b) / 4.4;
    function px(lx) { return PAD.l + (lx + 2.5) * sx; }
    function py(ly) { return PAD.t + (1.5 - ly) * sy; }
    var th = RS.rad(theta), ph = RS.rad(phi), half = th / 2, ARM = 1.8;
    var aL = { x: -ARM * Math.sin(half), y: 0 }, aR = { x: ARM * Math.sin(half), y: 0 };
    var lp = { x: 0, y: -ARM * Math.cos(half) };
    draw.text(ctx, WD / 2, 20, 'Diagrama del Anclaje en V', C.text, 13, { align: 'center', baseline: 'middle', bold: true });
    // pared
    ctx.strokeStyle = C.anchor; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(px(-2.3), py(0)); ctx.lineTo(px(2.3), py(0)); ctx.stroke();
    // brazos
    ctx.lineWidth = 3.5; ctx.lineCap = 'round';
    ctx.strokeStyle = col1; ctx.beginPath(); ctx.moveTo(px(aL.x), py(aL.y)); ctx.lineTo(px(lp.x), py(lp.y)); ctx.stroke();
    ctx.strokeStyle = col2; ctx.beginPath(); ctx.moveTo(px(aR.x), py(aR.y)); ctx.lineTo(px(lp.x), py(lp.y)); ctx.stroke();
    // ref vertical
    var arr = Math.min(W_kN * 0.6, 1.0);
    draw.dashedLine(ctx, px(lp.x), py(lp.y), px(lp.x), py(lp.y - arr * 1.15), C.grid, 1, [4, 4]);
    // flecha carga a phi
    var adx = arr * Math.sin(ph), ady = -arr * Math.cos(ph);
    draw.arrow(ctx, px(lp.x), py(lp.y), px(lp.x + adx), py(lp.y + ady), C.danger, 3, 14);
    // arco phi
    if (Math.abs(phi) > 2) {
      var pr = arr * 0.45 * sx;
      ctx.strokeStyle = C.info; ctx.lineWidth = 1.8; ctx.beginPath();
      ctx.arc(px(lp.x), py(lp.y), pr, Math.PI / 2, Math.PI / 2 - ph, ph > 0); ctx.stroke();
      var ma = Math.PI / 2 - ph / 2;
      draw.text(ctx, px(lp.x) + (pr + 14) * Math.cos(ma), py(lp.y) + (pr + 14) * Math.sin(ma), 'φ=' + (phi >= 0 ? '+' : '') + phi + '°', C.info, 9, { align: 'center', baseline: 'middle', bold: true });
    }
    // arco theta
    var ar = 0.55 * sx;
    ctx.strokeStyle = C.warning; ctx.lineWidth = 1.5; ctx.beginPath();
    ctx.arc(px(lp.x), py(lp.y), ar, Math.PI / 2 - half, Math.PI / 2 + half); ctx.stroke();
    draw.text(ctx, px(lp.x), py(lp.y) - ar - 5, theta + '°', C.warning, 12, { align: 'center', baseline: 'bottom', bold: true });
    // anclajes
    [[aL, 'A₁', C1], [aR, 'A₂', C2]].forEach(function (a) {
      draw.diamond(ctx, px(a[0].x), py(a[0].y), 8, a[2]);
      draw.text(ctx, px(a[0].x), py(a[0].y) - 11, a[1], a[2], 11, { align: 'center', baseline: 'bottom', bold: true });
    });
    // punto carga
    draw.dot(ctx, px(lp.x), py(lp.y), 9, C.warning, C.bg);
    // W badge
    var lblX = Math.max(-1.9, Math.min(lp.x + adx * 1.6, 1.9)), lblY = lp.y + ady * 1.6;
    draw.badge(ctx, px(lblX), py(lblY), ['W = ' + W_kN.toFixed(2) + ' kN', '(' + mass.toFixed(0) + ' kg)'], C.danger, 10);
    // tensiones
    [[aL, T1, C1, -1, 'izq'], [aR, T2, C2, 1, 'der']].forEach(function (a) {
      var mx = (a[0].x + lp.x) / 2 + a[3] * 0.35, my = (a[0].y + lp.y) / 2;
      var note = a[1] <= 0 ? 'FLOJO' : a[1].toFixed(2) + ' kN';
      draw.badge(ctx, px(mx), py(my), [a[4] + ' = ' + note], a[2], 9);
    });
    // seguridad
    var slack = T1 <= 0 || T2 <= 0, maxr = Math.max(r1, r2), st, sc;
    if (slack) { st = '⚠ UN LADO SE AFLOJA — INESTABLE'; sc = C.danger; }
    else if (maxr > 1) { st = '✗ PELIGROSO'; sc = C.danger; }
    else if (maxr > 0.75) { st = '⚠ PRECAUCIÓN'; sc = C.warning; }
    else { st = '✓ SEGURO'; sc = C.accent; }
    draw.badge(ctx, WD / 2, HD - 18, [st, 'izq ' + (r1 * 100).toFixed(0) + '%  ·  der ' + (r2 * 100).toFixed(0) + '% del peso'], sc, 11, true);
    return { T1: T1, T2: T2, r1: r1, r2: r2 };
  }

  function drawCurve(theta, mass, phi, res) {
    var ctx = ctxC, ph = RS.rad(phi), sign = phi >= 0 ? '+' : '';
    draw.clear(ctx, WC, HC);
    var PAD = { l: 62, r: 28, t: 50, b: 50 };
    var cw = WC - PAD.l - PAD.r, ch = HC - PAD.t - PAD.b, XMAX = 175;
    var YMAX = Math.max(Math.min(Math.max(res.r1, res.r2) * 1.6, 5.5), 1.5);
    function px(x) { return PAD.l + x / XMAX * cw; }
    function py(y) { return PAD.t + ch - y / YMAX * ch; }
    draw.text(ctx, WC / 2, 24, 'Cuanto más abierta la V, más fuerza en cada lado', C.primary, 12, { align: 'center', baseline: 'middle', bold: true });
    // zonas
    [[0, Math.min(0.75, YMAX), C.accent], [0.75, Math.min(1, YMAX), C.warning], [1, YMAX, C.danger]].forEach(function (z) {
      if (z[1] > z[0]) { ctx.save(); ctx.globalAlpha = 0.09; ctx.fillStyle = z[2]; ctx.fillRect(px(0), py(z[1]), cw, py(z[0]) - py(z[1])); ctx.restore(); }
    });
    // grid
    ctx.save(); ctx.strokeStyle = C.grid; ctx.globalAlpha = 0.45; ctx.lineWidth = 0.5;
    for (var gx = 0; gx <= XMAX; gx += 30) { ctx.beginPath(); ctx.moveTo(px(gx), py(0)); ctx.lineTo(px(gx), py(YMAX)); ctx.stroke(); }
    for (var gy = 0; gy <= YMAX + 0.01; gy += 0.5) { ctx.beginPath(); ctx.moveTo(px(0), py(gy)); ctx.lineTo(px(XMAX), py(gy)); ctx.stroke(); }
    ctx.restore();
    // ejes + ticks
    ctx.strokeStyle = C.anchor; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(px(0), py(0)); ctx.lineTo(px(XMAX), py(0)); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(px(0), py(0)); ctx.lineTo(px(0), py(YMAX)); ctx.stroke();
    for (var xt = 0; xt <= XMAX; xt += 30) draw.text(ctx, px(xt), py(0) + 7, xt + '°', C.text, 10, { align: 'center', baseline: 'top' });
    for (var yt = 0; yt <= YMAX + 0.01; yt += 0.5) draw.text(ctx, px(0) - 8, py(yt), yt.toFixed(1), C.text, 10, { align: 'right', baseline: 'middle' });
    draw.text(ctx, PAD.l + cw / 2, HC - 6, 'Ángulo de la V (grados)', C.text, 12, { align: 'center', baseline: 'bottom' });
    // curva helper
    function plot(color, lw, dash, fn) {
      ctx.save(); ctx.strokeStyle = color; ctx.lineWidth = lw; ctx.setLineDash(dash); ctx.beginPath();
      var started = false;
      for (var a = 2; a <= 175; a += 0.4) {
        var yv = fn(a); if (!isFinite(yv) || yv < -0.01) { started = false; continue; }
        var yc = Math.min(Math.max(yv, 0), YMAX);
        if (!started) { ctx.moveTo(px(a), py(yc)); started = true; } else ctx.lineTo(px(a), py(yc));
      }
      ctx.stroke(); ctx.restore();
    }
    plot(C.grid, 1.5, [7, 5], function (a) { return 1 / (2 * Math.cos(RS.rad(a) / 2)); });
    if (Math.abs(phi) > 0) {
      plot(C1, 2.2, [], function (a) { var sinT = Math.max(Math.sin(RS.rad(a)), 1e-6); return Math.sin(RS.rad(a) / 2 + ph) / sinT; });
      plot(C2, 2.2, [6, 3], function (a) { var sinT = Math.max(Math.sin(RS.rad(a)), 1e-6); return Math.sin(RS.rad(a) / 2 - ph) / sinT; });
    } else plot(C.primary, 2.8, [], function (a) { return 1 / (2 * Math.cos(RS.rad(a) / 2)); });
    // ref points
    [0, 60, 90, 120, 150].forEach(function (ra) {
      var rv = ra === 0 ? 0.5 : 1 / (2 * Math.cos(RS.rad(ra) / 2));
      if (rv > YMAX * 1.05) return;
      draw.dot(ctx, px(ra), py(Math.min(rv, YMAX)), 4, C.text);
      draw.text(ctx, px(ra) + 5, py(Math.min(rv, YMAX)) - 5, ra + '°', C.text, 8);
    });
    // 100% line
    draw.dashedLine(ctx, px(0), py(1), px(XMAX), py(1), C.danger, 1.5, [5, 4]);
    // linea vertical actual
    draw.dashedLine(ctx, px(theta), py(0), px(theta), py(YMAX), C.warning, 2, [6, 4]);
    // marcadores
    draw.dot(ctx, px(theta), py(Math.min(res.r1, YMAX)), 8, C1, C.bg);
    var sq = 7; ctx.fillStyle = C2; ctx.strokeStyle = C.bg; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.rect(px(theta) - sq, py(Math.min(Math.max(res.r2, 0), YMAX)) - sq, sq * 2, sq * 2); ctx.fill(); ctx.stroke();
    // info box
    var lines = ['θ = ' + theta + '°   φ = ' + sign + phi + '°', 'Lado 1 = ' + res.T1.toFixed(2) + ' kN (' + (res.r1 * 100).toFixed(0) + '% W)', 'Lado 2 = ' + res.T2.toFixed(2) + ' kN (' + (res.r2 * 100).toFixed(0) + '% W)'];
    ctx.font = 'bold 9px ' + RS.FONT;
    var maxW = 0; lines.forEach(function (l) { maxW = Math.max(maxW, ctx.measureText(l).width); });
    var bw = maxW + 14, bh = lines.length * 15 + 7;
    var ibx = theta < 115 ? px(theta) + 10 : px(theta) - bw - 8;
    ibx = Math.max(PAD.l + 2, Math.min(ibx, WC - PAD.r - bw - 2));
    var iby = Math.max(PAD.t + bh + 4, py(Math.min(Math.max(res.r1, res.r2, 0), YMAX)) - 6);
    ctx.fillStyle = C.bg + 'EC'; ctx.strokeStyle = C.warning; ctx.lineWidth = 1.5;
    draw.rrect(ctx, ibx, iby - bh, bw, bh, 5); ctx.fill(); ctx.stroke();
    lines.forEach(function (l, i) { draw.text(ctx, ibx + 7, iby - bh + 4 + (i + 0.5) * 15, l, C.warning, 9, { baseline: 'middle', bold: true }); });
  }

  function render(v) {
    var res = drawDiagram(v.theta, v.mass, v.phi);
    drawCurve(v.theta, v.mass, v.phi, res);
  }

  RS.controls('ctrls', [
    { id: 'theta', label: 'Ángulo V (°)', min: 2, max: 175, value: 60, step: 1, color: 'primary', decimals: 0 },
    { id: 'mass', label: 'Peso (kg)', min: 10, max: 300, value: 100, step: 1, color: 'secondary', decimals: 0 },
    { id: 'phi', label: 'Descentrar (°)', min: -90, max: 90, value: 0, step: 1, color: 'info', decimals: 0 }
  ], render);

  render({ theta: 60, mass: 100, phi: 0 });
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
