<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Factor de Caída</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Factor de Caída', icon: 'fas fa-bolt' });
  var C = RS.COLORS, G = RS.G, draw = RS.draw;
  var MBS = RS.ROPE_STATIC_MBS, MASS = 100, ROPE = 2, EPS_D = 0.35, EPS_S = 0.03;

  root.innerHTML =
    '<h1>Factor de Caída — Simulación Animada</h1>' +
    '<p class="sim-sub">FF = distancia de caída / longitud de cuerda.&nbsp; F = m·g·(1 + FF/ε).&nbsp; ε: elongación de la cuerda (dinámica 35% vs estática 3%).</p>' +
    '<div class="sim-buttons" id="btns"></div>' +
    '<div class="sim-buttons" id="actions"></div>' +
    '<div class="sim-stage"><canvas id="cv" width="1120" height="560"></canvas></div>' +
    '<p class="sim-footnote">Mismo escalador (100 kg) y cuerda (2 m); el escenario cambia el factor de caída. Una cuerda estática dispara la fuerza de choque; F &gt; 30 kN rompería la cuerda.</p>';

  var cv = document.getElementById('cv');
  var ctx = RS.setupCanvas(cv);
  var W = cv._cssW, H = cv._cssH;
  var SCALE = 46, ANCHOR_PY = 150, WALL_X = 70, CLIMBER_X = 120;

  var S = { ff: 1.0, label: 'FF 1.0 — Nivel del anclaje' };
  function reset() {
    S.fallDist = S.ff * ROPE;
    S.startM = ROPE - S.fallDist;
    S.endM = ROPE;
    S.climberM = S.startM;
    S.velocity = 0; S.falling = false; S.impact = false;
    S.bouncePhase = 0; S.tSinceImpact = 0; S.simTime = 0;
    S.tension = 0; S.hist = [];
    S.trail = [];
    S.res = null;
  }
  function startFall() { reset(); S.falling = true; }
  reset();
  var slowMotion = false, paused = false;

  function computeTension() {
    if (!S.impact) return 0;
    var t = S.tSinceImpact, mg = MASS * G / 1000;
    var T = mg + (S.res.Fdyn - mg) * Math.exp(-3 * t) * Math.cos(8 * t);
    return Math.max(0, T);
  }

  function update(dt) {
    if (paused) return;
    var eff = (slowMotion && S.falling && !S.impact) ? dt * 0.2 : dt;
    S.simTime += eff;
    S.tension = computeTension();
    S.hist.push([S.simTime, S.tension]);
    var cutoff = S.simTime - 5.0;
    while (S.hist.length && S.hist[0][0] < cutoff) S.hist.shift();

    if (!S.falling || S.impact) {
      if (S.impact) {
        S.tSinceImpact += eff; S.bouncePhase += eff * 8;
        var damp = Math.exp(-S.tSinceImpact * 3);
        S.climberM = S.endM + damp * Math.sin(S.bouncePhase) * 0.3;
      }
      return;
    }
    S.velocity += G * eff;
    S.climberM += S.velocity * eff;
    S.trail.push(S.climberM);
    if (S.trail.length > 90) S.trail.shift();
    if (S.climberM >= S.endM) {
      S.climberM = S.endM; S.impact = true;
      var ff = S.ff;
      S.res = {
        speed: Math.sqrt(2 * G * S.fallDist),
        Fdyn: MASS * G * (1 + ff / EPS_D) / 1000,
        Fsta: MASS * G * (1 + ff / EPS_S) / 1000,
        aDyn: G * ff / EPS_D, aSta: G * ff / EPS_S,
        brakeDyn: EPS_D * ROPE, brakeSta: EPS_S * ROPE
      };
      S.res.gDyn = S.res.Fdyn * 1000 / (MASS * G);
      S.res.gSta = S.res.Fsta * 1000 / (MASS * G);
    }
  }

  function mToPx(m) { return ANCHOR_PY + m * SCALE; }

  function drawTensionGraph() {
    var gx = 20, gy = 350, gw = 430, gh = 190, padL = 46, padT = 20, padB = 24, padR = 10;
    ctx.save(); ctx.fillStyle = 'rgba(10,20,10,0.85)'; ctx.fillRect(gx, gy, gw, gh);
    ctx.strokeStyle = C.grid; ctx.lineWidth = 1; ctx.strokeRect(gx, gy, gw, gh); ctx.restore();
    draw.text(ctx, gx + padL, gy + 4, 'Tensión de la cuerda (kN) — tiempo real', C.primary, 10, { baseline: 'top' });
    var px0 = gx + padL, px1 = gx + gw - padR, py0 = gy + padT, py1 = gy + gh - padB;
    var mg = MASS * G / 1000;
    var peak = S.impact ? S.res.Fdyn : 0;
    var maxY = Math.max(peak * 1.15, mg * 2.5, 3.0);
    function ty(kn) { return py1 - Math.min(kn, maxY) / maxY * (py1 - py0); }
    [0, mg, 6, 9, 12].forEach(function (kn) {
      if (kn > maxY) return;
      var col = kn === 12 ? C.danger : (Math.abs(kn - mg) < 0.05 ? C.accent : C.grid);
      draw.dashedLine(ctx, px0, ty(kn), px1, ty(kn), col, 1, kn === 12 ? [4, 3] : []);
      draw.text(ctx, gx + 2, ty(kn), kn.toFixed(1), col === C.grid ? C.anchor : col, 8, { baseline: 'middle' });
    });
    if (maxY >= 12) draw.text(ctx, px1 - 4, ty(12) - 3, 'UIAA 12kN', C.danger, 8, { align: 'right', baseline: 'bottom' });
    if (S.hist.length >= 2) {
      var tMin = S.hist[0][0], tMax = S.hist[S.hist.length - 1][0], span = Math.max(tMax - tMin, 1e-3);
      function tx(t) { return px0 + (t - tMin) / span * (px1 - px0); }
      for (var i = 0; i < S.hist.length - 1; i++) {
        var kn = S.hist[i + 1][1];
        var col = kn < 6 ? C.accent : (kn < 9 ? C.warning : C.danger);
        ctx.strokeStyle = col; ctx.lineWidth = 2; ctx.beginPath();
        ctx.moveTo(tx(S.hist[i][0]), ty(S.hist[i][1])); ctx.lineTo(tx(S.hist[i + 1][0]), ty(kn)); ctx.stroke();
      }
      var last = S.hist[S.hist.length - 1];
      var dc = last[1] < 6 ? C.accent : (last[1] < 9 ? C.warning : C.danger);
      draw.dot(ctx, tx(last[0]), ty(last[1]), 4, dc);
      draw.text(ctx, tx(last[0]) - 4, ty(last[1]) - 8, last[1].toFixed(2) + ' kN', dc, 9, { align: 'right' });
    }
  }

  function drawClimber(cx, cyPx, impact) {
    var col = impact ? C.warning : C.primary, helmet = impact ? C.danger : C.secondary;
    var hip = [cx, cyPx + 2], sh = [cx, cyPx - 16];
    ctx.strokeStyle = col; ctx.lineWidth = 5; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(sh[0], sh[1]); ctx.lineTo(hip[0], hip[1]); ctx.stroke();
    [-1, 1].forEach(function (s) {
      ctx.beginPath(); ctx.moveTo(sh[0], sh[1]); ctx.lineTo(cx + s * 11, cyPx - 11); ctx.lineTo(cx + s * 16, cyPx - 26); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(hip[0], hip[1]); ctx.lineTo(cx + s * 7, cyPx + 17); ctx.lineTo(cx + s * 12, cyPx + 31); ctx.stroke();
    });
    draw.dot(ctx, cx, cyPx - 30, 8, col);
    ctx.fillStyle = helmet; ctx.beginPath(); ctx.arc(cx, cyPx - 31, 8, Math.PI, 0); ctx.fill();
  }

  function drawInfo() {
    var px = 470, py = 30, pw = W - px - 20;
    ctx.save(); ctx.fillStyle = C.panel; draw.rrect(ctx, px, py - 10, pw, H - py - 10, 8); ctx.fill();
    ctx.strokeStyle = C.primary; ctx.lineWidth = 1; ctx.stroke(); ctx.restore();
    var x = px + 14, y = py + 12;
    draw.text(ctx, x, y, S.label, C.primary, 16, { bold: true }); y += 26;
    draw.text(ctx, x, y, 'Masa: 100 kg · Cuerda: 2.0 m · Caída: ' + S.fallDist.toFixed(1) + ' m', C.text, 12); y += 22;
    var ffcol = S.ff < 0.5 ? C.accent : (S.ff < 1.5 ? C.warning : C.danger);
    draw.text(ctx, x, y, 'Factor de Caída = d / L = ' + S.ff.toFixed(2), ffcol, 15, { bold: true }); y += 26;
    if (!S.impact) { draw.text(ctx, x, y, 'Elegí escenario y pulsá "Iniciar caída".', C.warning, 12); return; }
    var r = S.res;
    draw.text(ctx, x, y, 'Velocidad de impacto: ' + r.speed.toFixed(2) + ' m/s (' + (r.speed * 3.6).toFixed(1) + ' km/h)', C.info, 12); y += 22;
    draw.text(ctx, x, y, 'Dist. frenado: din. ' + (r.brakeDyn * 100).toFixed(0) + ' cm | est. ' + (r.brakeSta * 100).toFixed(0) + ' cm', C.text, 11); y += 20;
    var acol = r.aDyn < 30 ? C.accent : (r.aDyn < 80 ? C.warning : C.danger);
    draw.text(ctx, x, y, 'Acel. frenado: din. ' + r.aDyn.toFixed(0) + ' m/s² (' + (r.aDyn / G).toFixed(1) + 'g)', acol, 12); y += 24;
    draw.text(ctx, x, y, 'Cuerda DINÁMICA: ' + r.Fdyn.toFixed(2) + ' kN (' + (r.Fdyn * 1000 / G).toFixed(0) + ' kg equiv.)', C.accent, 12, { bold: true }); y += 22;
    var scol = r.Fsta > MBS ? C.danger : (r.Fsta > 12 ? C.danger : C.warning);
    var stxt = 'Cuerda ESTÁTICA: ' + r.Fsta.toFixed(2) + ' kN' + (r.Fsta > MBS ? ' ← SUPERA MBS (' + MBS + ' kN)' : '');
    draw.text(ctx, x, y, stxt, scol, 12, { bold: true }); y += 22;
    var gcol = r.gDyn < 5 ? C.accent : (r.gDyn < 10 ? C.warning : C.danger);
    draw.text(ctx, x, y, 'Fuerzas G: din. ' + r.gDyn.toFixed(1) + 'g | est. ' + r.gSta.toFixed(1) + 'g', gcol, 11); y += 26;
    // barras
    var barW = pw - 40, barH = 18;
    [['Din', r.Fdyn, C.accent], ['Est', r.Fsta, r.Fsta > 12 ? C.danger : C.warning]].forEach(function (b) {
      ctx.fillStyle = '#28281e'; ctx.fillRect(x, y, barW, barH);
      ctx.fillStyle = b[2]; ctx.fillRect(x, y, barW * Math.min(b[1] / MBS, 1), barH);
      draw.text(ctx, x + 4, y + barH / 2, b[0] + ': ' + b[1].toFixed(2) + ' kN', C.text, 10, { baseline: 'middle' });
      y += barH + 6;
    });
    // refs sobre barras
    [[12, 'UIAA', C.danger], [MBS, 'MBS', C.danger]].forEach(function (rf) {
      var rx = x + barW * rf[0] / MBS;
      draw.dashedLine(ctx, rx, y - 2 * (barH + 6), rx, y, rf[2], 1.5, [3, 3]);
    });
    y += 8;
    // tabla comparativa
    draw.text(ctx, x, y, 'COMPARATIVA DE ESCENARIOS', C.primary, 11, { bold: true }); y += 18;
    var cols = [x, x + 130, x + 195, x + 275, x + 360];
    ['Escenario', 'FF', 'v(km/h)', 'F.din', 'F.est'].forEach(function (h, i) { draw.text(ctx, cols[i], y, h, C.anchor, 9); });
    y += 16;
    [[0.25, 'corta'], [0.5, 'moderada'], [1.0, 'anclaje'], [2.0, 'máxima']].forEach(function (sc) {
      var ff = sc[0], fd = ROPE * ff, v = Math.sqrt(2 * G * fd) * 3.6;
      var fd_ = MASS * G * (1 + ff / EPS_D) / 1000, fs_ = MASS * G * (1 + ff / EPS_S) / 1000;
      var cur = Math.abs(ff - S.ff) < 0.01, rc = cur ? C.warning : C.text;
      var cells = [(cur ? '→ ' : '  ') + 'FF' + ff.toFixed(2) + ' ' + sc[1], ff.toFixed(2), v.toFixed(0), fd_.toFixed(1), fs_.toFixed(1)];
      cells.forEach(function (cel, i) { draw.text(ctx, cols[i], y, cel, i === 4 && fs_ > MBS ? C.danger : rc, 9); });
      y += 16;
    });
  }

  function draw_() {
    draw.clear(ctx, W, H);
    draw.text(ctx, 250, 18, S.impact ? 'Impacto absorbido — oscilando' : (S.falling ? 'Caída libre ↓ ' + S.velocity.toFixed(1) + ' m/s' : 'Elegí escenario y pulsá Iniciar'), S.falling && !S.impact ? C.danger : C.warning, 13, { align: 'center', bold: true });
    // pared
    ctx.fillStyle = '#182818'; ctx.fillRect(WALL_X - 30, 40, 30, H - 90);
    // anclaje
    var apx = [WALL_X, mToPx(0)];
    draw.dot(ctx, apx[0], apx[1], 11, C.anchor); draw.dot(ctx, apx[0], apx[1], 5, C.warning);
    draw.text(ctx, apx[0] - 4, apx[1] - 16, 'ANCLAJE', C.anchor, 9, { align: 'right' });
    // estela
    S.trail.forEach(function (m, i) {
      var ratio = i / Math.max(S.trail.length - 1, 1);
      ctx.globalAlpha = ratio * 0.8; draw.dot(ctx, CLIMBER_X, mToPx(m), Math.max(1, ratio * 3), C.rope); ctx.globalAlpha = 1;
    });
    // cuerda (bezier con comba si hay cuerda floja)
    var clPx = [CLIMBER_X, mToPx(S.climberM)];
    var dist = Math.hypot(clPx[0] - apx[0], clPx[1] - apx[1]), ropePx = ROPE * SCALE;
    var slack = Math.max(0, ropePx - dist), bow = Math.min(slack * 0.7, 70);
    var mxp = (apx[0] + clPx[0]) / 2 + bow * 0.45, myp = (apx[1] + clPx[1]) / 2 + bow;
    var ropeCol = C.rope;
    if (S.impact) { var it = Math.min(S.res.Fdyn / 15, 1); ropeCol = 'rgb(' + Math.round(255 * it + 170 * (1 - it)) + ',' + Math.round(255 * (1 - it) + 51) + ',68)'; }
    ctx.strokeStyle = ropeCol; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.beginPath();
    ctx.moveTo(apx[0], apx[1]); ctx.quadraticCurveTo(mxp, myp, clPx[0], clPx[1]); ctx.stroke();
    // distancia markers
    var syp = mToPx(S.startM), eyp = mToPx(S.endM);
    ctx.strokeStyle = C.accent; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(WALL_X + 30, syp); ctx.lineTo(WALL_X + 60, syp); ctx.stroke();
    draw.text(ctx, WALL_X + 64, syp - 4, 'Inicio', C.accent, 9);
    ctx.strokeStyle = C.danger; ctx.beginPath(); ctx.moveTo(WALL_X + 30, eyp); ctx.lineTo(WALL_X + 60, eyp); ctx.stroke();
    draw.text(ctx, WALL_X + 64, eyp - 4, 'Fin caída', C.danger, 9);
    if (Math.abs(eyp - syp) > 20) {
      var ax = WALL_X + 110;
      draw.arrow(ctx, ax, syp, ax, eyp, C.warning, 2, 8);
      draw.text(ctx, ax + 8, (syp + eyp) / 2, 'd = ' + S.fallDist.toFixed(1) + ' m', C.warning, 9);
    }
    drawClimber(clPx[0], clPx[1], S.impact);
    if (S.falling && !S.impact && S.velocity > 0.5) draw.text(ctx, CLIMBER_X + 22, clPx[1] - 12, '↓ ' + S.velocity.toFixed(1) + ' m/s', C.danger, 10);
    drawTensionGraph();
    drawInfo();
  }

  var last = null;
  function loop(ts) {
    if (last === null) last = ts;
    var dt = Math.min((ts - last) / 1000, 0.05); last = ts;
    update(dt); draw_();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // Controles
  RS.buttonGroup('btns', [
    { label: 'FF 0.25 corta', value: 0.25 }, { label: 'FF 0.5 moderada', value: 0.5 },
    { label: 'FF 1.0 anclaje', value: 1.0 }, { label: 'FF 2.0 máxima', value: 2.0 }
  ], 1.0, function (ff) {
    var labels = { 0.25: 'FF 0.25 — Caída corta', 0.5: 'FF 0.50 — Caída moderada', 1.0: 'FF 1.0 — Nivel del anclaje', 2.0: 'FF 2.0 — Factor máximo' };
    S.ff = ff; S.label = labels[ff]; reset();
  });
  var acts = document.getElementById('actions');
  function mkBtn(txt, fn) { var b = document.createElement('button'); b.className = 'sim-btn'; b.textContent = txt; b.addEventListener('click', fn); acts.appendChild(b); return b; }
  mkBtn('▶ Iniciar caída', function () { if (!paused) startFall(); });
  mkBtn('↺ Reiniciar', function () { reset(); });
  var slowBtn = mkBtn('🐢 Cámara lenta', function () { slowMotion = !slowMotion; slowBtn.classList.toggle('active', slowMotion); });
  var pauseBtn = mkBtn('⏸ Pausa', function () { paused = !paused; pauseBtn.classList.toggle('active', paused); });

  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
