<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Física del Rescate — Distribución Multi-Anclaje</title>
  <link rel="icon" type="image/svg+xml" href="../images/favicon.svg">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@600&family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@500;700&display=swap">
  <link href="../vendor/bootstrap/css/bootstrap.min.css" rel="stylesheet">
  <link href="../css/font-awesome/css/all.min.css" rel="stylesheet">
  <link href="../css/main.css" rel="stylesheet">
  <link href="lib/ropesim.css" rel="stylesheet">
  <script>(function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();</script>
</head>
<body id="top">
  <div class="scroll-progress d-print-none" id="scrollProgress"></div>
  <div id="rs-app"></div>

  <script src="lib/ropesim.js"></script>
  <script src="lib/shell.js"></script>
  <script>
  var root = RS.shell({ title: 'Distribución Multi-Anclaje', icon: 'fas fa-project-diagram' });
  var C = RS.COLORS, G = RS.G, phys = RS.phys, draw = RS.draw;
  var NFPA = RS.NFPA_WORK_LOAD, ANCHOR_MBS = 25.0, SF_MIN = 10;
  var ACOL = ['#00ff33', '#ffb000', '#00d9a0', '#aaff44'];
  var ALAB = ['A1', 'A2', 'A3', 'A4'];
  var MX = 360, MY = 430;  // punto maestro

  root.innerHTML =
    '<h1>Distribución de Fuerzas en Multi-Anclaje</h1>' +
    '<p class="sim-sub">Sistema auto-ecualizado: F_i = W · cos(α_i) / Σ cos(α_j). El tirante más vertical carga más. Arrastrá los anclajes con el mouse.</p>' +
    '<div class="sim-buttons" id="actions"></div>' +
    '<div class="sim-stage"><canvas id="cvM" width="720" height="520"></canvas><canvas id="cvI" width="400" height="520"></canvas></div>' +
    '<div id="ctrls"></div>' +
    '<p class="sim-footnote">Si un anclaje falla, la carga se redistribuye al instante y genera carga de choque por extensión. Tirante más inclinado = menos carga.</p>';

  var cvM = document.getElementById('cvM'), cvI = document.getElementById('cvI');
  var ctxM = RS.setupCanvas(cvM), ctxI = RS.setupCanvas(cvI);
  var WM = cvM._cssW, HM = cvM._cssH, WI = cvI._cssW, HI = cvI._cssH;

  var st = { mass: 100, n: 3, selected: 0, showFail: false, positions: [] };
  function setup() {
    var base = 130, spread = 150;
    if (st.n === 3) st.positions = [[MX - spread, base], [MX, base - 35], [MX + spread, base]];
    else st.positions = [[MX - spread, base], [MX - spread / 3, base - 30], [MX + spread / 3, base - 30], [MX + spread, base]];
    st.showFail = false;
    if (st.selected >= st.n) st.selected = 0;
  }
  setup();

  function computeForces(positions) {
    var W = st.mass * G / 1000, res = [], cosSum = 0;
    positions.forEach(function (p, i) {
      var dx = p[0] - MX, dy = MY - p[1], len = Math.max(Math.hypot(dx, dy), 1);
      var cosA = Math.max(dy / len, 0.01), alpha = RS.deg(Math.acos(Math.min(cosA, 1)));
      res.push({ index: i, pos: p, alpha: alpha, cosA: cosA, force: 0, pct: 0, failed: false });
      cosSum += cosA;
    });
    res.forEach(function (r) { if (cosSum > 1e-3) { r.force = W * r.cosA / cosSum; r.pct = r.force / W * 100; } else { r.force = W / positions.length; r.pct = 100 / positions.length; } });
    return res;
  }
  function failureScenario(failIdx) {
    var remain = st.positions.filter(function (_, i) { return i !== failIdx; });
    var sub = computeForces(remain), out = [], k = 0;
    for (var i = 0; i < st.positions.length; i++) {
      if (i === failIdx) out.push({ index: i, pos: st.positions[i], alpha: 0, force: 0, pct: 0, failed: true });
      else { var r = sub[k++]; r.index = i; r.pos = st.positions[i]; out.push(r); }
    }
    return out;
  }
  function forceColor(pct, n) {
    var ideal = 100 / n, ratio = ideal > 0 ? pct / ideal : 1;
    if (ratio <= 1.1) return C.accent;
    if (ratio <= 1.5) return C.warning;
    if (ratio <= 2.0) return C.secondary;
    return C.danger;
  }

  function drawScene(results) {
    var ctx = ctxM; draw.clear(ctx, WM, HM);
    // roca
    ctx.save(); ctx.fillStyle = '#14261a'; draw.rrect(ctx, 20, 40, WM - 40, HM - 130, 10); ctx.fill();
    ctx.strokeStyle = C.anchor; ctx.lineWidth = 2; ctx.stroke(); ctx.restore();
    draw.text(ctx, 30, 52, 'PARED DE ROCA', C.anchor, 10, { baseline: 'top' });
    // vertical ref
    draw.dashedLine(ctx, MX, 60, MX, MY, '#3c503c', 1, [4, 6]);
    draw.text(ctx, MX + 5, 62, 'Vertical', '#3c503c', 9, { baseline: 'top' });
    // tirantes + fuerzas
    results.forEach(function (r) {
      var failed = st.showFail && r.index === st.selected;
      var col = ACOL[r.index % 4];
      if (failed) { draw.dashedLine(ctx, r.pos[0], r.pos[1], MX, MY, C.danger, 2, [8, 6]); return; }
      var fc = forceColor(r.pct, st.showFail ? st.n - 1 : st.n);
      if (st.showFail) { var fr = failureScenario(st.selected).filter(function (x) { return x.index === r.index && !x.failed; })[0]; if (fr) fc = forceColor(fr.pct, st.n - 1); }
      ctx.strokeStyle = fc; ctx.lineWidth = Math.max(2, Math.min(r.pct / 10, 6));
      ctx.beginPath(); ctx.moveTo(r.pos[0], r.pos[1]); ctx.lineTo(MX, MY); ctx.stroke();
      // etiqueta
      var mx = (r.pos[0] + MX) / 2, my = (r.pos[1] + MY) / 2;
      var dx = MX - r.pos[0], dy = MY - r.pos[1], len = Math.hypot(dx, dy) || 1;
      var nx = -dy / len * 22, ny = dx / len * 22;
      draw.badge(ctx, mx + nx, my + ny, [r.alpha.toFixed(1) + '°', r.force.toFixed(2) + ' kN'], fc, 8);
    });
    // pernos
    results.forEach(function (r) {
      var sel = r.index === st.selected, failed = st.showFail && r.index === st.selected;
      var col = failed ? C.danger : ACOL[r.index % 4], size = sel ? 13 : 10;
      draw.dot(ctx, r.pos[0], r.pos[1], size + 3, '#50506e');
      draw.dot(ctx, r.pos[0], r.pos[1], size, col);
      draw.dot(ctx, r.pos[0], r.pos[1], size - 4, failed ? C.danger : C.bg);
      if (sel && !failed) { ctx.strokeStyle = C.white; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(r.pos[0], r.pos[1], size + 6, 0, Math.PI * 2); ctx.stroke(); }
      if (failed) {
        var s = size + 6; ctx.strokeStyle = C.danger; ctx.lineWidth = 4;
        ctx.beginPath(); ctx.moveTo(r.pos[0] - s, r.pos[1] - s); ctx.lineTo(r.pos[0] + s, r.pos[1] + s); ctx.moveTo(r.pos[0] + s, r.pos[1] - s); ctx.lineTo(r.pos[0] - s, r.pos[1] + s); ctx.stroke();
      }
      draw.text(ctx, r.pos[0], r.pos[1] - size - 12, ALAB[r.index] + (failed ? ' FALLO' : ''), col, 12, { align: 'center', baseline: 'bottom', bold: true });
    });
    // punto maestro
    draw.dot(ctx, MX, MY, 16, C.warning); draw.dot(ctx, MX, MY, 11, C.bg);
    ctx.strokeStyle = C.warning; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(MX, MY, 16, 0, Math.PI * 2); ctx.stroke();
    draw.text(ctx, MX, MY + 20, 'PUNTO MAESTRO', C.warning, 10, { align: 'center', baseline: 'top' });
    // carga
    var W = st.mass * G / 1000, ly = MY + 46;
    ctx.strokeStyle = C.rope; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(MX, MY + 16); ctx.lineTo(MX, ly - 6); ctx.stroke();
    ctx.fillStyle = C.secondary; draw.rrect(ctx, MX - 30, ly, 60, 32, 5); ctx.fill();
    ctx.strokeStyle = C.text; ctx.lineWidth = 2; ctx.stroke();
    draw.dot(ctx, MX - 10, ly + 12, 5, C.primary);
    draw.text(ctx, MX + 4, ly + 16, st.mass + ' kg', C.text, 10, { baseline: 'middle' });
    draw.arrow(ctx, MX, ly + 38, MX, ly + 68, C.danger, 3, 9);
    draw.text(ctx, MX, ly + 82, 'W = ' + W.toFixed(2) + ' kN', C.danger, 11, { align: 'center', bold: true });
  }

  function drawPanel(results) {
    var c = ctxI; draw.clear(c, WI, HI);
    var W = st.mass * G / 1000, x = 14, y = 24, lh = 16;
    draw.text(c, x, y, 'ANÁLISIS DE FUERZAS', C.primary, 14, { bold: true }); y += 24;
    draw.text(c, x, y, 'Masa: ' + st.mass + ' kg   Peso: ' + W.toFixed(2) + ' kN', C.text, 11); y += 16;
    draw.text(c, x, y, 'Sistema: ' + st.n + ' puntos · ideal ' + (100 / st.n).toFixed(1) + '% c/u', C.text, 11); y += 20;
    draw.dashedLine(c, x, y, WI - 14, y, C.grid, 1, []); y += 8;
    draw.text(c, x, y, 'FUERZA POR ANCLAJE', C.primary, 12, { bold: true }); y += 20;
    results.forEach(function (r) {
      var failed = st.showFail && r.index === st.selected;
      if (failed) { draw.text(c, x + 4, y, ALAB[r.index] + ': --- FALLO ---', C.danger, 11); y += 34; return; }
      var fc = forceColor(r.pct, st.n);
      draw.text(c, x + 4, y, ALAB[r.index] + ':  α=' + r.alpha.toFixed(1) + '°  F=' + r.force.toFixed(2) + ' kN (' + r.pct.toFixed(1) + '%)', fc, 11); y += 15;
      var ts = phys.slingTension(r.force, r.alpha), sf = ts > 0.001 ? ANCHOR_MBS / ts : 999;
      var sfc = sf >= SF_MIN ? C.accent : (sf >= 5 ? C.warning : C.danger);
      draw.text(c, x + 8, y, 'T_tirante=' + ts.toFixed(2) + ' kN  FS=' + sf.toFixed(1) + ':1', sfc, 9); y += 19;
    });
    y += 4; draw.dashedLine(c, x, y, WI - 14, y, C.grid, 1, []); y += 8;
    // barras
    draw.text(c, x, y, 'DISTRIBUCIÓN (%)', C.primary, 12, { bold: true }); y += 18;
    var barW = WI - x - 90, ideal = 100 / st.n;
    results.forEach(function (r) {
      var failed = st.showFail && r.index === st.selected;
      draw.text(c, x, y + 1, ALAB[r.index], ACOL[r.index % 4], 9);
      c.fillStyle = '#28283a'; c.fillRect(x + 26, y, barW, 14);
      if (!failed) {
        c.fillStyle = forceColor(r.pct, st.n); c.fillRect(x + 26, y, barW * Math.min(r.pct / 100, 1), 14);
        var idealX = x + 26 + barW * ideal / 100;
        c.strokeStyle = C.white; c.lineWidth = 1; c.beginPath(); c.moveTo(idealX, y); c.lineTo(idealX, y + 14); c.stroke();
        draw.text(c, x + 30 + barW * Math.min(r.pct / 100, 1) + 4, y + 2, r.pct.toFixed(1) + '%', C.text, 9, { baseline: 'top' });
      } else draw.text(c, x + 30 + barW / 2 - 15, y + 2, 'FALLO', C.danger, 9, { baseline: 'top' });
      y += 20;
    });
    draw.text(c, x + 26, y, '| = ideal (' + ideal.toFixed(0) + '%)', '#5a8c5a', 9); y += 18;
    draw.dashedLine(c, x, y, WI - 14, y, C.grid, 1, []); y += 8;
    // fallo
    draw.text(c, x, y, 'SI ' + ALAB[st.selected] + ' FALLA:', C.warning, 12, { bold: true }); y += 18;
    var fr = failureScenario(st.selected), maxF = 0;
    fr.forEach(function (f) { if (!f.failed && f.force > maxF) maxF = f.force; });
    fr.forEach(function (f) {
      if (f.failed) return;
      var orig = results.filter(function (r) { return r.index === f.index; })[0];
      draw.text(c, x + 4, y, '  ' + ALAB[f.index] + ': ' + (orig ? orig.force.toFixed(2) : '?') + ' → ' + f.force.toFixed(2) + ' kN (' + f.pct.toFixed(1) + '%)', forceColor(f.pct, st.n - 1), 9); y += 14;
    });
    y += 4;
    var shock = maxF * 1.5;
    draw.text(c, x + 4, y, 'Carga de choque (×1.5): ' + shock.toFixed(2) + ' kN', C.danger, 9); y += 14;
    if (shock > ANCHOR_MBS) draw.text(c, x + 4, y, 'SUPERA resistencia del anclaje!', C.danger, 9);
    else if (maxF > NFPA) draw.text(c, x + 4, y, 'Supera carga de trabajo NFPA.', C.warning, 9);
  }

  function render() {
    var results = computeForces(st.positions);
    drawScene(results); drawPanel(results);
  }

  // ── mouse drag ──
  var dragging = -1;
  function evPos(e) {
    var rect = cvM.getBoundingClientRect();
    var sx = WM / rect.width, sy = HM / rect.height;
    var t = e.touches ? e.touches[0] : e;
    return [(t.clientX - rect.left) * sx, (t.clientY - rect.top) * sy];
  }
  function down(e) {
    var p = evPos(e);
    for (var i = 0; i < st.positions.length; i++) {
      if (Math.hypot(p[0] - st.positions[i][0], p[1] - st.positions[i][1]) < 22) {
        dragging = i; st.selected = i; st.showFail = false; failBtn.classList.remove('active'); render(); e.preventDefault(); return;
      }
    }
  }
  function move(e) {
    if (dragging < 0) return;
    var p = evPos(e);
    var x = Math.max(50, Math.min(p[0], WM - 50)), y = Math.max(60, Math.min(p[1], MY - 40));
    st.positions[dragging] = [x, y]; render(); e.preventDefault();
  }
  function up() { dragging = -1; }
  cvM.addEventListener('mousedown', down); window.addEventListener('mousemove', move); window.addEventListener('mouseup', up);
  cvM.addEventListener('touchstart', down); cvM.addEventListener('touchmove', move); window.addEventListener('touchend', up);

  // ── controles ──
  var acts = document.getElementById('actions');
  RS.buttonGroup('actions', [{ label: '3 puntos', value: 3 }, { label: '4 puntos', value: 4 }], 3, function (n) { st.n = n; setup(); render(); });
  function mkBtn(txt, fn) { var b = document.createElement('button'); b.className = 'sim-btn'; b.textContent = txt; b.addEventListener('click', fn); acts.appendChild(b); return b; }
  ALAB.slice(0, 4).forEach(function (_, i) { });
  var selWrap = mkBtn('Seleccionar siguiente', function () { st.selected = (st.selected + 1) % st.n; st.showFail = false; failBtn.classList.remove('active'); render(); });
  var failBtn = mkBtn('Simular fallo', function () { st.showFail = !st.showFail; failBtn.classList.toggle('active', st.showFail); render(); });
  mkBtn('↺ Reset', function () { setup(); render(); });

  RS.controls('ctrls', [
    { id: 'mass', label: 'Masa (kg)', min: 20, max: 500, value: 100, step: 10, color: 'secondary', decimals: 0 }
  ], function (v) { st.mass = v.mass; render(); });

  render();
  RS.responsive('.sim-stage');
  </script>

  <script src="../vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="../scripts/main.js"></script>
</body>
</html>
